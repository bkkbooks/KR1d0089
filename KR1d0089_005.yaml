body:
  text: 家禮卷五宋朱子撰祭禮四時祭時祭用仲月前旬卜日孟春下旬之首擇仲月三旬各一日或丁或亥主人盛服立於祠堂中門外西向兄弟立於主人之南少退北上子孫立於主人之後重行西向北上置卓子於主人之前設香爐香合㺽珓及盤於其上主人搢笏焚香薰珓而命以上旬之日曰某將以來月某日諏此嵗事適其祖考尚餐即以珓擲於盤以一俯一仰為吉不吉更卜中旬之日又不吉則不復卜而直用下旬之日既得曰祝開中門主人以下北向立如朔望之位皆再拜主人升焚香再拜祝執辭跪於主人之左讀曰孝孫某將以來月某日祇薦嵗事於祖考卜既得吉敢告用下旬日則不言卜既得吉主人再拜降復位與在位者皆再拜祝閉門主人以下復西向位執事者立於門西皆東靣北上祝立於主人之右命執事者曰孝孫某將以來月某日祗薦嵗事於祖考有司具修執事者應曰諾乃退前期三日齊戒前期三日主人帥衆丈夫致齊於外主婦帥衆婦女致齊於內沐浴更衣飲酒不得至亂食肉不得茹葷不弔喪不聼樂凡凶穢之事皆不得預前一日設位陳器主人帥衆丈夫深衣及執事灑掃正寢洗拭倚卓務令蠲潔設高祖考妣位於堂西北壁下南向考西妣東各用一倚一卓而合之曾祖考妣祖考妣考妣以次而東皆如高祖之位世各為位不屬祔位皆於東序西向北上或兩序相向其尊者居西妻以下則於階下設香案於堂中置香爐香合於其上東茅聚沙於香案前及逐位前地上設酒架於東階上别置卓子於其東設酒注一酹酒盞一盤一受胙盤一匕一巾一茶合茶筅茶盞托鹽碟醋瓶於其上火爐湯瓶香匙火筯於西階上别置卓子於其西設祝版於其上設盥盆帨巾各二於阼階下之東西其西者有臺架又設陳饌大牀於其東省牲滌器具饌主人帥衆丈夫深衣省牲涖殺主婦帥衆婦女背子滌濯祭器潔釜鼎具祭饌每位果六品菜蔬及脯醢各三品肉魚饅頭糕各一盤羮飯各一碗肝各一串肉各二串務令精潔未祭之前勿令人先食及為猫犬蟲鼠所汚厥明夙興設蔬果酒饌主人以下深衣及執事者俱詣祭所盥手設果楪於逐位卓子南端蔬菜脯醢相間次之設盞盤醋楪於北端盞西楪東匙筯居中設𤣥酒及酒各一瓶於架上𤣥酒其日取井花水充在酒之西熾炭於爐實水於瓶主婦背子炊暖祭饌皆令極熱以合盛出置東階下大牀上質明奉主就位主人以下各盛服盥手帨手詣祠堂前衆丈夫叙立如告日之儀主婦西階下北向立主人有母則特位於主婦之前諸伯叔母諸姑繼之嫂及弟婦姊妹在主婦之左其長於主母主婦者皆少進子孫婦女內執事者在主婦之後重行皆北向東上立定主人升自阼階搢笏焚香出笏告曰孝孫某今以仲春之月有事於皇高祖考某官府君皇高祖妣某封某氏皇曾祖考某官府君皇曾祖妣某封某氏皇祖考某官府君皇祖妣某封某氏皇考某官府君皇妣某封某氏以某親某官府君某親某封某氏祔食敢請神主出就正寢恭伸奠獻告訖搢笏斂櫝正位祔位各置一笥各以執事者一人捧之主人出笏前導主婦從後卑幼在後至正寢置於西階卓子上主人搢笏啓櫝奉諸考神主出就位主婦盥帨升奉諸妣神主亦如之其祔位則子弟一人奉之既畢主人以下皆降復位參神主人以下叙立如祠堂之儀立定再拜若尊長老疾者休於它所降神主人升搢笏焚香出笏少退立執事者一人開酒取巾拭瓶口實酒於注一人取東階卓上盤盞立於主人之左一人執注立於主人之右主人搢笏跪奉盤盞者亦跪進盤盞主人受之執注者亦跪斟酒於盞主人左手執盤右手執盞灌於茅上以盤盞授執事者出笏俯伏興再拜降復位進饌主人升主婦從之執事者一人以盤奉魚肉一人以盤奉米麵食一人以盤奉羮飯從升至高祖位前主人搢笏奉肉奠於盤盞之南主婦奉麵食奠於肉西主人奉魚奠於醋碟之南主婦奉米食奠於魚東主人奉羮奠於醋碟之東主婦奉飯奠於盤盞之西主人出笏以次設諸正位使諸子弟婦女各設祔位皆畢主人以下皆降復位初獻主人升詣高祖位前執事者一人執酒注立於其右主人搢笏奉高祖考盤盞位前東向立執事者西向斟酒於盞主人奉之奠於故處次奉高祖妣盤盞亦如之出笏位前北向立執事者二人奉高祖考妣盤盞立於主人之左右主人搢笏跪執事者亦跪主人受高祖考盤盞右手取盞祭之茅上以盤盞授執事者反之故處受高祖妣盤盞亦如之出笏俯伏興少退立執事者炙肝於爐以碟盛之兄弟之長一人奉之奠於高祖考妣前匙筋之南祝取版立於主人之左跪讀曰維年嵗月朔日子孝元孫某官某敢昭告於皇高祖考某官府君皇高祖妣某封某氏氣序流易時維仲春追感嵗時不勝永慕敢以潔牲柔毛粢盛醴齊祗薦嵗事以某親某官府君某親某封某氏祇食尚饗畢興主人再拜退詣諸位獻祝如初每逐位讀祝畢即兄弟衆男之不為亞終獻者以次分詣本位所祔之位酌獻如儀但不讀祝獻畢皆降復位執事者以它器徹酒及肝置盞故處亞獻主婦為之諸婦女奉炙肉及分獻如初獻儀但不讀祝終獻兄弟之長或長男或親賓為之衆子弟奉炙肉及分獻如亞獻儀侑食主人升搢笏執注就斟諸位之酒皆滿立於香案之東南主婦升扱匙飯中西柄正筯立於香案之西南皆北向再拜降復位闔門主人以下皆出祝闔門無門處即降簾可也主人立於門東西向衆丈夫在其後主婦立於門西東向衆婦女在其後如有尊長則少休於他所此所謂厭也啓門祝聲三噫歆乃啓門主人以下皆入其尊長先休於它所者亦入就位主人主婦奉茶分進於考妣之前祔位使諸子弟婦女進之受胙執事者設席於香案前主人就席北靣祝詣高祖考前舉酒盤盞詣主人之右主人跪祝亦跪主人搢笏受盤盞祭酒啐酒祝取匙并盤抄取諸位之飯各少許奉以詣主人之左嘏於主人曰祖考命工祝承致多福於汝孝孫使汝受祿於天宜稼於田眉夀永年勿替引之主人置酒於席前出笏俯伏興再拜搢笏跪受飯嘗之實於左袂掛袂於季指取酒卒飲執事者受盞自右置注旁受飲自左亦如之主人執笏俯伏興立於東階上西向祀立於西階上東向告利成降復位與在位者皆再拜主人不拜降復位辭神主人以下皆再拜納主主人主婦皆升各奉主納於櫝主人以笥斂櫝奉歸祠堂如來儀徹主婦還監徹酒之在盞注它器中者皆入於瓶緘封之所謂福酒果蔬肉食並傳於燕器主婦監滌祭器而藏之餕是日主人監分祭胙品取少許置於合并酒皆封之遣僕執書歸胙於親友遂設席男女異處尊行自為一列南面自堂中東西分首若止一人則當中而坐其餘以次相對分東西向尊者一人先就坐衆男叙立世為一行以東為上皆再拜子弟之長者一人少進立執事者一人執注立於其右一人執盤盞立於其左獻者搢笏跪祖考嘉饗伏起受注斟酒反注受盞祝曰祀事既成願某親備膺五福保族冝家授執盞者置於尊者之前長者出笏尊者舉酒畢長者俯伏興退復位與衆男皆再拜尊者命取注及長者之盞置於前自斟之祝曰祀事既成五福之慶與汝曹共之命執事者以次就位斟酒皆遍長者進跪受飲畢俯伏興退立衆男進揖退立飲長者與衆男皆再拜諸婦女獻女尊長於內如衆男之儀但不跪既畢乃就坐薦肉食諸婦女詣堂前獻男尊長壽男尊長酢之如儀衆男詣中堂獻女尊長壽女尊長酢之如儀乃就坐薦麵食內外執事者各獻內外尊長壽如儀而不酢遂就斟在坐者遍俟皆舉乃再拜退遂薦米食然後泛行酒間以祭饌酒饌不足則以它酒它饌益之將罷主人頒胙於外僕主婦頒胙於內執事者遍及微賤其日皆盡受者皆再拜乃徹席凡祭主於盡愛敬之誠而已貧則稱家之有無疾則量筋力而行之財力可及者自當如儀初祖惟繼始祖之宗得祭冬至祭始祖程子曰此厥初生民之祖也冬至一陽之始故象其類而祭之前期三日齊戒如時祭之儀前期一日設位主人衆丈夫深衣帥執事者灑掃祠堂滌濯器具設神位於堂中間北壁下設屏風於其後食牀於其前陳器設火爐於堂中設炊烹之具於東階下盥東炙具在其南束茅以下並同時祭主婦衆婦女背子帥執事者滌濯祭器潔釜鼎具果楪六盤三杅六小盤三盞盤匙筯各二脂盤一酒注酹酒盤盞一受胙盤匙一以按此夲合用古祭器今恐私家或不能辦且用今器從簡便神位用蒲薦加草席皆有緣或用紫褥皆長五尺濶二尺有半屏風如枕屏之制足以圍席三面食牀以扳為面長五尺濶三尺餘四圍亦以版高一尺二寸二寸之下乃施版面皆黑漆具饌晡時殺牲主人親割毛血為一盤首心肝肺為一盤脂雜以蒿為一盤皆腥之左胖不用右胖前足為三假脊為三假脅為三條後足為三假去近竅一節不用凡十一體飯米一杅置於一盤蔬果各六品切肝一小盤切肉一小盤厥明夙興設蔬果酒饌主人深衣帥執事者設𤣥酒瓶及酒瓶於架上酒注酹酒盤盞受胙盤匙各一於東階卓子上祝版反脂盤於西階卓子上匙筯各一於食牀北端之東西相去二尺五寸盤盞各一於筯西果子在食牀南端蔬在其北毛血腥盤切肝肉皆陳於階下饌牀上米實階下炊具中十一體實烹具中以火㸑而熟之盤一杆六置饌牀上質明盛服就位如時祭儀降神參神主人盥升奉脂盤詣堂中爐前跪告曰孝孫某今以冬至有事於皇始祖考皇始祖妣敢請尊靈降居神位恭伸奠獻遂燎脂於爐炭上俯伏興少退立再拜執事者開酒主人跪酹如時祭之儀進饌主人升詣神位前執事者奉毛血腥肉以進主人受設之於蔬北西上執事者出熟肉置於盤奉以進主人受設之腥盤之東執事者以杅二盛飯杅二盛肉湆不和者又以杅二盛肉湆以菜者奉以進主人受設之飯在盞西大羮在盞東鉶羮在大羮東皆降復位初獻如時祭之儀但主人既俯伏興兄弟炙肝加鹽實於小盤以從祝辭曰維年歲月朔日子孝孫姓名敢昭告於皇初祖考皇初祖妣今以中冬陽至之始追惟報本禮不敢忘謹以潔牲柔毛粢盛醴齊祗薦嵗事亞獻如時祭之儀但衆婦炙肉加鹽以從終獻如時祭及上儀侑食闔門啓門受胙辭神徹餕並如時祭之儀先祖繼始祖高祖之宗得祭繼始祖之宗則自初祖而下繼高祖之宗則自先祖而下立春祭先祖程子曰初祖以下高祖以上之祖也立春生物之始故象其類而祭之前三日齊戒如祭初祖之儀前一日設位陳器如祭初祖之儀但設祖考神位於堂中之西祖妣神位於堂中之東蔬果碟各十二大盤六小盤六餘並同具饌如祭初祖之儀但毛血為一盤首心為一盤肝肺為一盤脂蒿為一盤切肝兩小盤切肉四小盤餘並同厥明夙興設蔬果酒饌如祭初祖之儀但每位匙筋各一盤盞各二置階下饌牀上餘並同質明盛服就位降神參神如祭初祖之儀但告辭改始為先餘並同進饌如祭初祖之儀但先詣祖考位奉毛血首心前足上二節脊三節後足上一節次詣祖妣位奉肝肺前足一節脅三節後足下一節餘並同初獻如祭初祖之儀但獻兩位各俯伏興當中少立兄弟炙肝兩小盤以從祝祠改初為先中冬陽至為立春生物餘並同亞獻終獻如祭初祖之儀但從炙肉各二小盤侑食闔門啓門受胙辭神徹餕並如祭初祖儀禰繼禰之宗以上皆得祭惟支子不祭季秋祭禰程子曰季秋成物之始亦象其類而祭之前一月下旬卜日如時祭之儀惟告辭改孝孫為孝子又改祖考妣為考妣若母在則止云皇考告於本龕之前餘並同前三日齊戒前一日設位陳器如時祭之儀但止於正寢合設兩位於堂中西上香案以下並同具饌如時祭之儀二分厥明夙興設蔬果酒饌如時祭之儀質明盛服詣祠堂奉神主出就正寢如時祭於正寢之儀但告辭云孝子某今以季秋成物之始有事於皇考某官府君皇妣某封某氏參神降神進饌初獻並如時祭之儀但祝辭曰今以季秋成物之始感時追慕昊天罔極餘並同亞獻終獻侑食闔門啓門受胙辭神納主徹餕並如時祭之儀忌日前一日齊戒如祭禰之儀設位如祭禰之儀但止設一位陳器如祭禰之儀具饌如祭禰之儀一分厥明夙興設蔬果酒饌如祭禰之儀質明主人以下變服禰則主人兄弟黲紗幞頭黲布衫布裏角帶祖以上則黲紗衫旁親則皂紗衫主婦特髻去飾白大衣淡黃帔餘人皆去華盛之服詣祠堂奉神主出就正寢如祭禰之儀但告辭云今以某親某官府君逺諱之辰敢請神主出就正寢恭伸追慕餘並同參神降神進饌初獻如祭禰之儀但祝辭云嵗序流易諱日復臨追逺感時不勝永慕考妣改不勝永慕為昊天罔極旁親云諱日復臨不勝感愴若考妣則祝興主人以下哭盡哀餘並同亞獻終獻侑食闔門啓門並如祭禰之儀但不受胙辭神納主徹並如祭禰之儀但不餕是日不飲酒不食肉不聼樂黲布素服素帶以居夕寢於外墓祭三日上旬擇日前一日齊戒如家祭之儀具饌墓上每分如時祭之品更設魚肉米麵食各一大盤以祀后土厥明灑掃主人深衣帥執事者詣墓所再拜奉行塋域內外環繞哀省三周其有草棘即用刀斧鉏斬芟夷灑掃訖復位再拜又除地於墓左以祭后土布席陳饌用新潔席陳於墓前設饌如家祭之儀參神降神初獻如家祭之儀但祝辭云某親某官府君之墓氣序流易雨露既濡瞻掃封塋不勝感慕餘並同亞獻終獻並以子弟親賓為之辭神乃徹遂祭后土布席陳饌四盤於席南端設盤盞匙筋於其北餘並同上降神參神三獻同上但祝辭云某官姓名敢昭告於后土氏之神某恭修嵗事於某親某官府君之墓惟時保佑實賴神休敢以酒饌敬伸奠獻尚饗辭神乃徹而退家禮卷五
