body:
  text: 家禮卷三宋朱子撰昬禮議昬男子年十六至三十女子年十四至二十司馬公曰古者男三十而娶女二十而嫁今令文男年十五女年十三以上並聴昬嫁今為此説所以参古今之道酌禮令之中順天地之理合人情之宜也身及主昬者無期以上喪乃可成昬大功未𦵏亦不可主昬以凡主昬如冠禮主人之法但宗子自昬則族人之長為主必先使媒氏往來通言俟女氏許之然後納采司馬公曰凡議昬姻當先察其壻與婦之性行及家法何如勿苟慕其富貴壻苟賢矣今雖貧賤安知異時不富貴乎苟為不肖今雖富盛安知異時不貧賤乎婦者家之所由盛衰也苟慕其一時之富貴而娶之彼挾具富貴鮮有不輕其夫而傲其舅姑養成驕妬之性異日為患庸有極乎借使因婦財以致富依婦勢以取貴苟有丈夫之志氣者能無愧乎又世俗好於襁褓童㓜之時輕許為昬亦有指腹為昬者及其既長或不肖無頼或身有惡疾或家貧凍餒或喪服相仍或從宦逺方遂至棄信負約速獄至訟者多多是以先祖太尉嘗曰吾家男女必俟既長然後議昬既通書不数月必成昬故終身無此悔乃子孫所當法也納采納其采擇之禮即今世俗所謂言定也主人具書主人即主昬者書用牋紙如世俗之禮若族人之子則其父具書告於宗子夙興奉以告於祠堂如告冠儀其祝版前同但云某之子某若某之某親之子某年已長成未有伉儷已議娶某官某郡姓名之女今日納采不勝感愴謹以後同若宗子自昬則自告乃使子弟為使者如女氏女氏主人出見使者使者盛服如女氏女氏亦宗子為主人盛服出見使者非宗子之女則其父位於主人之右尊則少進卑則少退啜茶卑使者起致辭曰吾子有恵祝室某也某之某親某官有先人之禮使某請納采從者以書進使者以書授主人主人對曰某之子若妹姪孫蠢愚又弗能教吾子命之某不敢辭北向再拜使者避不荅拜使者請退俟命出就次若許嫁者於主人為姑姊則不云蠢愚又弗能教餘辭並同遂奉書以告於祠堂如壻家之儀祝版前同但云某之第㡬女若某親某之第㡬女年漸長成已許嫁某官某郡姓名之子若某親某今日納采不勝感愴謹以後同出以復書授使者遂禮之主人出延使者升堂授以復書使者受之謂退主人請禮賓乃以酒饌禮使者使者至是始與主人交拜揖如常曰賓客之禮其從者亦禮之别室皆酧以幣使者復命壻氏主人復以告於祠堂不用祝納幣古禮有問名納吉今不能盡用止用納采納幣以從簡便納幣幣用色繪貧富隨宜少不過兩多不踰十今人更用釵釧羊酒果實之屬亦可具書遣使如女氏女氏受書復書禮賓使者復命並同納采之儀禮如納采但不告廟使者致辭改采為幣從者以書幣進使者以書授主人主人對曰吾子順先典貺某重禮某不敢辭敢不承命乃受書執事者受幣主人再拜使者避之復進請命主人授以復書餘並同親迎前期一日女氏使人張陳其壻之室世俗謂之鋪房然所張陳者但氊褥帳幔帷幙應用之物其衣服鏁之篋笥不必陳也司馬公曰文中子曰昬娶而論財夷虜之道也夫昏姻者所以合二姓之好上以事宗廟下以繼後世也今世俗之貪鄙者将娶婦先問資装之厚薄将嫁女先問聘財之多少至於立契約云某物若干某物若干以求售其女者亦有既嫁而復欺紿負約者是乃狙儈賣婢鬻奴之法豈得謂之士大夫昏姻哉其舅姑既被欺紿則殘虐其婦以攄其忿由是愛其女者務厚其資装以悦其舅姑者殊不知彼貪鄙之人不可盈厭資装既竭則安用汝女哉於是質其女以責貨於女氏貨有盡而責無窮故昏姻之家往往終為仇讐矣是以世俗生男則喜生女則戚至有不舉其女者用此故也然則議昏姻有及於財者皆勿與為昏姻可也厥明壻家設位於室中設倚卓於兩位東西相向蔬果盤盞匕筯如賔客之禮酒壺在東位之後又以卓子置合􅈟一於其南又南北設二盥盆勺於室東隅右設酒壺盞注於室外或别室以飲從者􅈟音謹以小匏一判而兩之女家設次於外初昬壻盛服世俗新壻帶花勝以擁蔽其面殊失丈夫之容體勿用可也主人告於祠堂如納采儀祝版前同但云某之子某若某親之子某将以今日親迎於某官某郡某氏不勝感愴謹以後同昬若宗子自則自告遂醮其子而命之迎先以卓子設酒注盤盞於堂上主人盛服坐於堂之東序西向設壻席於其西北南向壻升自西階立於席西南向賛者取盞斟酒執之詣壻席前壻再拜升席南向受盞跪祭酒興就席末跪啐酒興降席授賛者盞又再拜進詣父坐前東向跪父命之曰往迎爾相承我宗事勉率以敬若則有常壻曰諾惟恐不堪不敢忘命俛伏興出非宗子之子則宗子告於祠堂而其父醮於私室如儀但改宗事為家事若宗子已孤而自昬則不用此禮壻出乘馬以二燭前導至女家俟於次壻下馬於大門外入俟於次女家主人告於祠堂如納采儀祝版前同但云某之第幾女若某親某之第㡬女将以今日歸於某官某郡姓名不勝感愴謹以後同遂醮其女而命之女盛飾姆相之立於室外南向父坐東序西向母坐西序東向設女席於母之東北南向賛者醮以酒如壻禮姆導女出於母左父起命之曰敬之戒之夙夜無違爾舅姑之命母送至西階上為之整冠歛帔命之曰勉之敬之夙夜無違爾閨門之禮諸母姑嫂姊送至於中門之内為之整裙衫申以父母之命曰謹聴爾父母之言夙夜無愆非宗子之女則宗子各于祠堂而某父醮於私室如儀主人出迎壻入奠鴈主人迎壻於門外揖讓以入壻執鴈以從至于㕔事主人升自阼階立西向壻升自西階北向跪置鴈於地主人侍者受之壻俛伏興再拜主人不荅拜若族人之女則其父從主人出迎立於其右尊則少進卑則少退之凡贄用生鴈左首以生色繪交絡之無則刻木為取其順陰陽往來之義程子曰取其不再偶也姆奉女出登車姆奉女出中門壻揖之降自西階主人不降壻遂出女從之壻舉轎簾以俟姆辭曰未教不足與為禮也女乃登車壻乘馬先婦車婦車亦以二燭前導至其家導婦以入壻至家立於㕔事俟婦下車揖之導以入壻婦交拜婦從者布壻席於東方壻從者布婦席於西方壻盥於南婦從者沃之進帨婦盥於北壻從者沃之進帨壻揖婦就席婦拜壻荅拜就坐飲食畢壻出壻揖婦就坐壻東婦西從者斟酒設饌壻婦祭酒舉殽又斟酒壻揖婦舉欽不祭無殽又取􅈟分置壻婦之前斟酒壻揖婦舉飲不祭無殽壻出就他室姆與婦留室中徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘復入脫服燭出壻脫服婦從者受之婦脱服壻從者受之為司馬公曰古詩云結髪為夫婦言自少年束髪即夫婦猶李廣言結髪與匈奴戰也今世俗昏姻乃有結髮之禮謬誤可笑勿用可也主人禮賓男賓於外㕔女賔於中堂婦見舅姑明日夙興婦見於舅姑婦夙興盛服俟見舅姑坐於堂上東西相向各置卓子於前家人男女少於舅姑者立於兩序如冠禮之叙婦進立于阼階下北面拜舅升奠贄幣於卓上舅撫之侍者以入婦降又拜畢誧西階下北靣拜姑升奠贄幣姑舉以授侍者婦降又拜姑若非宗子之子而與宗子同居則先行此禮於舅之私室與宗子不同居則如上儀舅姑禮之如父母醮女之儀婦見於諸尊長婦既受禮降自西階同居有尊於舅姑者則舅姑以婦見於其室如見舅姑之禮還拜諸尊長於兩序如冠禮無贄小郎小姑皆相拜非宗子之子而與宗子同居則既受禮詣其堂上拜之如舅姑禮而還見於兩序其宗子及尊長不同居則廟見而后往若冡婦則饋於舅姑是日食時婦家具盛饌酒壺婦從者設蔬果卓子於堂上舅姑之前設盥盤於阼階東南帨架在東舅姑就坐婦盥升自西階洗盞斟酒置舅卓子上降俟舅飲畢又拜遂獻姑進酒姑受飲畢婦降拜遂執饌升薦於舅姑之前侍立姑後以俟卒食徹飯侍者徹餘饌分置别室婦就餕姑之餘婦從者餕舅之餘壻從者又餕婦之餘非宗子之子則於私室如儀舅姑饗之如禮婦之儀禮畢舅姑先降自西階婦降自阼階廟見三日主人以婦見於祠堂古者三月而廟見今以其太逺改用三日如子冠而見之儀但告辭曰子某之婦某氏敢見餘並同壻見婦之父母明日壻往見婦之父母婦父迎送揖讓如客禮拜即跪而扶之入見婦母婦母闔門左扉立於門内壻拜於門外皆有幣婦父非宗子即先見宗子夫婦不用幣如上儀然後見婦之父母次見婦黨諸親不用幣婦女相見如上儀婦家禮壻如常儀親迎之夕不當見婦母及諸親及設酒饌以婦未見舅姑故也家禮卷三
