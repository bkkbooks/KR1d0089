body:
  text: 家禮禮類六雜禮書之屬提要臣等謹案家禮五卷舊本題宋朱子撰案王懋竑白田雜著有家禮考曰家禮非朱子之書也家禮載子行狀其序載于文集其成書之嵗月載于年譜其書亡而復得之由載于家禮附録自宋以來遵而用之其為朱子之書幾無可疑者乃今反復考之而知決非朱子之書也李公晦叙年譜家禮成于庚寅居祝孺人喪時文集序不紀年月而序中絶不及居喪事家禮附録陳安卿述朱敬之之語以為此往年僧寺所亡本有士人録得會先生葬日擕來因得之其録得擕來不言其何人亦不言其得之何所也黃勉齊作行狀但云所輯家禮世所遵用其後多有損益未及更定既不言成於居母喪時亦不言其亡而復得其書家禮後亦然敬之朱子季子公晦勉齊安卿皆朱子髙第弟子而其言參錯不可考據如此按文集朱子答汪尚書書與張敬夫書吕伯恭書其論祭儀祭說往復甚詳汪吕書在壬辰癸巳張書不詳其年計亦其前後也壬辰癸巳距庚寅僅二三年家禮既有成書何為絶不之及而僅以祭儀祭說為言耶陳安卿録云向作祭儀祭說甚簡而易曉今已亡之矣則是所亡者乃祭儀祭說而非家禮也明矣文集語録自家禮序外無一語及家禮者惟與蔡季通書有已取家禮四卷納一哥之語此儀禮經傳通解中家禮六卷之四而非今所傳之家禮也甲寅八月跋三家禮範後云嘗欲因司馬氏之書參考諸家裁訂增損舉綱張目以附其後顧以衰病不能及已後之君子必有以成吾志也甲寅距庚寅二十年庚寅已有成書朱子雖耋年豈盡忘之至是而乃為是語耶竊嘗推求其故此必有因三家禮範跋語而依仿以成之者蓋自附於後之君子而傳者遂以託之朱子所自作其序文亦依仿禮範跋語而於家禮反有不合家禮重宗法此程張司馬氏所未及而序中絶不言之以跋語所未有也其年譜所云居母喪時所作則或者以意附益之爾敬之但據所傳不加深考此如司馬季思刻溫公書之比公晦從遊在戊申後其於早年固所不詳祗叙所聞以為譜而勉齊行狀之作在朱子沒後二十餘年其時家禮已盛行又為敬之所傳録故不欲公言其非但其辭略而不盡其書家禮後謂經傳通解未成為百世之遺恨則其微意亦可見矣後之人以朱子家季子所傳又見行狀年譜所載廖子晦陳安卿皆為刋刻三山楊氏上饒周氏復為之考訂尊而用之不敢少致其疑然雖云尊用其書實未有能行者故于其中謬誤亦不及察徒口相傳以熟文公家禮云爾惟元應氏作家禮辨其文亦不傳僅見于明邱仲深濬所刻家禮中其辨専據三家禮範跋語多疏略未有以解世人之惑仲深亦不然之故余今編考年譜行狀及朱子文集語録所載俱附于後而一一詳注之其應氏邱氏語亦並附焉其他所載謬誤亦數十條庶來者有以知家禮決非朱子之書而余亦得免于鑿空妄言之罪云云其考證最明又有家禮後考十七條引諸說以相印證家禮考誤四十六條引古禮以相辨難其說並精核有據懋竑之學篤信朱子獨于易本義九圖及是書齗齗辨論不肯附合則是書之不出朱子可灼然無疑然自元明以來流俗沿用故仍録而存之亦記所謂禮從宜使從俗也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀家禮序凡禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠婚喪祭儀章度數者其文也其本者有家日用之常禮固不可以一日而不修其文又皆所以紀綱人道之始終雖其行之有時施之有所然非講之素明習之素熟則其臨事之際亦無以合宜而應節是亦不可以一日而不講且習焉者也三代之際禮經備矣然其存於今者宫廬器服之制出入起居之節皆已不宜於世世之君子雖或酌以古今之變更為一時之法然亦或詳或略無所折衷至或遺其本而務其末緩於實而急於文自有志好禮之士猶或不能舉其要而困於貧窶者尤患其終不能有以及於禮也熹之愚蓋兩病焉是以嘗獨究觀古今之籍因其大體之不可變者而少加損益於其間以為一家之書大抵謹名分崇愛敬以為之本至其施行之際則又略浮文務本實以竊自附於孔子從先進之遺意誠願得與同志之士熟講而勉行之庶幾古人所以修身齊家之道謹終追逺之心猶可以復見而於國家所以崇化導民之意亦或有小補云
