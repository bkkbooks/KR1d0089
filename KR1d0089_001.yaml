body:
  text: 家禮卷一宋朱子撰通禮此篇所著皆所謂有家日用之常禮不可一日而不修者祠堂此章本合在祭禮篇今以報本反始之心尊祖敬宗之意實有家名分之首所以開業傳世之本也故特著此冠於篇端使覽者知所以先立乎其大者而凡後篇所以周旋升降出入向背之曲折亦有所據以考焉然古之廟制不見於經且今士庶人之賤亦有所不得為者故特以祠堂名之而其制度亦多用俗禮云君子將營宫室先立祠堂於正寢之東祠堂之制三間外為中門中門外為兩階皆三級東曰阼階西曰西階階下隨地廣狹以屋覆之令可容家衆叙立又為遺書衣物祭器庫及神厨於其東繚以周垣别為外門常加扃閉若家貧地狹則止為一間不立厨庫而東西壁下置立兩櫃西藏遺書衣物東藏祭器亦可正寢謂前堂也地狹則於㕔事之東亦可凡祠堂所在之宅宗子世守之不得分析東凡屋之制不問何向背但以前為南後為北左為右為西後皆放此為四龕以奉先世神主祠堂之内以近北一架為四龕毎龕内置一卓大宗及繼高祖之小宗則高祖居西曾祖次之祖次之父次之繼曽祖之小宗則不敢祭高祖而虚其西龕一繼祖之小宗則不敢祭曾祖而虚其西龕二繼禰之小宗則不敢祭祖而虚其西龕三若大宗世數未滿則亦虚其西龕如小宗之制神主皆藏於櫝中置於卓上南向龕外各垂小簾簾外設香卓於堂中置香爐香合於其上兩階之間又設香卓亦如之非嫡長子則不敢祭其父若與嫡長同居則死而後其子孫為立祠堂於私室且隨所繼世數為龕俟其出而異居乃備其制若生而異居則預於其地立齋以居如祠堂之制死則因以為祠堂主式見喪禮治𦵏章旁親之無後者以其班祔伯叔祖父母祔於高祖伯叔父母祔於曽祖妻若兄弟若兄弟之妻祔於祖子姪祔於父皆西向主櫝並如正位姪之父自立祠堂則遷而從之殤程子曰無服之殤不祭下殤之祭終父母之身中之祭終兄弟之身長殤之祭終兄弟之子之身成人而無後者其祭終兄弟之孫之身此皆以義起者也置祭田初立祠堂則計見田毎龕取其二十之一以為祭田親盡則以為墓田後凡正位祔者皆放此宗子主之以給祭用上世初未置田則合墓下子孫之田計數而割之皆立約開官不得典賣具祭器牀席倚卓盥盆火爐酒食之器隨其合用之數皆具貯於庫中而封鎖之不得它用無庫則貯於櫃中不可貯者列於外門之内主人晨謁於大門之内主人謂宗子主此堂之祭者晨謁深衣焚香再拜出入必告主人主婦近出則入大門瞻禮而行歸亦如之經宿而歸則焚香再拜逺出經旬以上則再拜焚香告云某將適某所敢告又再拜而行歸亦如之但告云某今日歸自某所敢見經月而歸則開中門立於階下再拜升自阼階焚香告畢再拜降復位再拜餘人亦然但不開中門凡主婦謂主人之妻凡升降惟主人由阼階主婦及餘人雖尊長亦由西階答凡拜男子再拜則婦人四拜謂之俠拜其男女相拜亦然正至朔望則參正至朔望前一日灑掃齊宿厥明夙興開門軸簾毎龕設新果一大盤於卓上每位茶盞托酒盞盤各一於神主櫝前設束茅聚沙於香卓前别設一卓於阼階上置酒注盞盤一於其上酒一缾於其西盥盆帨巾各二於阼階下東南有臺架者在西為主人親屬所盥無者在東為執事者所盥巾皆在北主人以下盛服入門就位主人北面於阼階下主婦北面於西階下主人有母則特位於主婦之前主人有諸父諸兄則特位於主人之右少前重行西上有諸母姑嫂姊則特位於主婦之左少前重行東上諸弟在主人之右少退子孫外執事者在主人之後重行西上主人弟之妻及諸妹在主婦之左少退子孫婦女内執事者在主婦之後重行東上立定主人盥帨升啟櫝奉諸考神主置於櫝前主婦盥帨升奉諸妣神主置於考東次出祔主亦如之命長子長婦或長女盥帨升分出諸祔主之卑者亦如之皆畢主婦以下先降復位主人詣香卓前降神焚香再拜執事者盥帨升開瓶實酒於注一人奉注詣主人之右一人執盞盤詣主人之左主人跪執事者皆跪主人受注斟酒反注取盞盤奉之左執盤右執盞酹於茅上俛伏興少退再拜降復位與在位者皆再拜參神主人升執注斟酒先正位次祔位次命長子斟諸祔位之卑者主婦升執茶筅執事者執湯瓶隨之㸃茶如前命長婦或長女亦如之子婦執事者先降復位主人主婦分立於香卓之前東西再拜降復位與在位者皆再拜辭神而退冬至則祭始祖畢行禮如上儀望日不設酒不出主主人㸃茶長子佐之先降主人立於香卓之南再拜乃降餘如上儀凖禮舅没則姑老不預於祭又曰支子不祭故今専以世嫡宗子夫婦為主人主婦其有母及諸父母兄嫂者則設特位於前如此頭凡言盛服者有官則幞頭公服帶靴笏進士則幞襕衫帶處士則幞頭皂衫帶無官者通用帽子衫帶又不能具則或深衣或涼衫有官者亦通服帽子以下但不為盛服婦人則假髻大衣長裾女有室者冠子背子衆妾假髻背子俗節則獻以時食節如清明寒食重午中元重陽之類凡鄉俗所尚者食如角黍凡其節之所尚者薦以大盤間以蔬果禮如正至朔日之儀有事則告如正至朔日之儀但獻茶酒再拜訖主婦先降復位主人立於香卓之南祝執版立於主人之左跪讀之畢興主人再拜降復位餘並同昭告授官祝版云維年嵗月朔日子孝某某官某敢告於皇某親某官封諡府君皇某親某封某氏某以某月某日䝉恩授某官奉承先訓獲霑祿位餘慶所及不勝感慕謹以酒果用伸䖍告謹告貶降則言貶某官荒墜先訓皇恐無地謹以後同若弟子則言某之某某餘同告追贈則止告所贈之龕别設香卓於龕前又設一卓於其東置浄水粉盞刷子硯墨筆於其上餘並同但祝版云奉某月某日制書贈皇某親某官皇某親某封某奉承先訓竊位於朝祗奉恩慶有此褒贈禄不及飬摧咽難勝謹以後同若因事特贈則别為文以叙其意告畢再拜主人進奉主置卓上執事者洗去舊字别塗以粉俟乾命善書者改題所贈官封䧟中不改洗水以灑祠堂之四壁主人奉主置故處乃降復位後同人主人生嫡長子則滿月而見如上儀但不用祝主立於香卓之前告曰某之婦某氏以某月某日生子名某敢見告畢立於香卓東南西向主婦抱子進見於兩階之間再拜主人乃降復位後同寸冠昬别見本篇其凡言祝版者用版長一尺高五以紙書文黏於上畢則揭而焚之其首尾皆如前但於皇高祖考皇高祖妣自稱孝元孫於皇曾祖考皇會祖妣自稱孝曽孫於皇祖考皇祖妣自稱孝孫於皇考皇妣自稱孝子有官封諡則皆稱之無則以生時行第稱號加於府君之上妣曰某氏夫人凡自稱非宗子不言孝止告事之祝四龕共為一版自稱以其最尊者為主告正位不告祔位茶酒則并設之或有水火盜賊則先救祠堂遷神主遺書次及祭器然後及家財易世則改題主而遞遷之改題遞遷禮見䘮禮大祥章大宗之家始祖親盡則藏其主於墓所而大宗猶主其墓田以奉其墓祭嵗率宗人一祭之百世不改其第二世以下祖親盡及小宗之家高祖親盡則遷其主而埋之其墓田則諸位迭掌而嵗率其子孫一祭之亦百世不改也深衣制度此章本在冠禮之後今以前章已有其文又平日之常服故次前章裁用白細布度用指尺中指中節為寸衣全四幅其長過脇下屬於裳用布二幅中屈下垂前後共為四幅如今之置領衫但不裁破腋下其下過脇而屬於裳處約圍七尺二寸毎幅屬裳三幅裳交觧十二幅上屬於衣其長及踝用布六幅毎幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聫其縫以屬於衣其屬衣處約圍七尺二寸毎三幅屬衣一幅其下邉及踝處約圍丈四尺四寸圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸圓殺之以至袂口則其徑一尺二寸方領兩襟相掩衽在腋下則兩領之㑹自方曲裾用布一幅如裳之長交觧裁之如裳之制但以廣頭向上布邉向外左掩其右交映垂之如燕尾狀又稍裁其内旁大半之下令漸如魚腹而末為鳥喙内向綴於裳之右旁黑縁緣用黑繪領表裏各二寸袂口裳邉表裏各一寸半袂口布外别此緣之廣大帶帶用白繪廣四寸夾縫之其長圍腰而結於前再繚之為兩耳乃垂其餘為紳下與裳齊以黑繪飾其紳復以五采絛廣三分約其相結之處長與紳齊緇冠糊紙為之武高寸許廣三寸袤四寸上為五梁廣如武之袤而長八寸跨頂前後下著於武屈其兩端各半寸自外向内而黑漆之武之兩旁半寸之上竅以受笄笄用齒骨凡白物幅巾用黒繪六尺許中屈之右邉就屈處為横左邉反屈之自左四五寸間斜縫向左圓曲而下遂循左邉至於兩末復反所縫餘繪使之向裏以當額前褁之至兩髻旁各綴一帶廣二寸長二尺目巾外過頂後相結而垂之黑履白絇繶純綦司馬氏居家雜儀此章夲在昬禮之後今按此乃家居平日之事所以正倫理篤恩愛者其本皆在於此必能行此然後其儀章度數有可觀焉不然則節文雖具而本實無取君子所不貴也故亦列於首篇使覽者知所先焉凡為家長必謹守禮法以御羣子弟及家衆分之以職謂使之掌倉廩廐庫庖廚舎業田園之類授之以事謂朝夕所幹及非常之事而責其成功制財用之節量入以為出稱家之有無以給上下之衣食及吉凶之費皆有品節而莫不均壹裁省冗費禁止奢華常湏稍存贏餘以備不虞凡諸卑幼事無大小毋得専行必咨禀於家長易曰家人有嚴君焉父母之謂也安有嚴君在上而其下敢直行自恣不顧者乎雖非父母當時為家長者亦當咨禀而行之則號令出於一人家政始可得而治矣凡為子為婦者毋得蓄私財俸禄及田宅所入盡歸之父母舅姑當用則請而用之不敢私假不敢私與内則曰子婦無私貨無私蓄無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏之以待乏鄭康成曰待舅姑之乏也不得命者不見許也又曰婦若有私親兄弟将與之則必復請其故賜而後與之夫人子之身父母之身也身且不敢自有况敢有私財乎若父子異財互相假借則是有子富而父母貧者父母饑而子飽者賈誼所謂借父耰鉏慮有徳色母取箕箒立而誶語不孝不義孰甚於此茝昌改切耰音憂誶音碎凡子事父母孫事祖父母同婦事舅姑孫婦亦同天欲明咸起盥音管洗手也潄櫛阻瑟切梳頭也緫所以束髮今之頭􅔮具冠帶丈夫帽子衫帶婦人冠子背子昧爽謂天明暗相交之際適父母舅姑之所省問丈夫唱喏婦人道萬福仍問侍者夜來安否何如侍者日安乃退其或不安節則侍者以告此即禮之晨省也父母舅姑起子供藥物藥物乃關身之切務人子當親自檢數調煮供進不可但委婢僕脱若有誤即其禍不測婦具晨羞俗謂㸃心易曰在中饋詩云惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖㕑今縱不親執刀匕亦當檢校監視務令精潔供具畢乃退各從其事將食婦請所欲於家長謂父母舅姑或當時家長也卑幼各不得恣所欲退具而共之尊長舉筯子婦乃各退就食丈夫婦人各設食於他所依長㓜而坐其飲食必均壹幼子又食於他所亦依長幼席地而坐男坐於左女坐於右及夕食亦如之既夜父母舅姑將寢則安置而退丈夫唱喏婦女道安置此即禮之昬定也居閒無事則侍於父母舅姑之所容貎必恭執事必謹言語應對必下氣怡聲出入起居必謹扶衛之不敢涕唾喧呼於父母舅姑之側父母舅姑不命之坐不敢坐不命之退不敢退凡子受父母之命必籍記而佩之時省而速行之事畢則返命焉或所命有不可行者則和色柔聲具是非利害而白之待父母之許然後改之若不許苟於事無大害者亦當曲從若以父母之命為非而直行已志雖所執皆是猶為不順之子况未必是乎凡父母有過下氣怡色柔聲以諫諫若不入起敬起孝悦則復諫不悦與其得罪於鄉黨州閭寧熟諫父母怒不悦而撻之流血不敢疾怨起敬起孝凡為人子弟者不敢以貴富加於父兄宗族加謂恃其富貴不率卑幼之禮凡為人子者出必告反必面有賓客不敢坐於正㕔有賓客坐於書院無書院則坐於㕔之旁側升降不敢由東階上下馬不敢當㕔凡事不敢自擬於其父凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不宴逰舎置餘事専以迎醫檢方合藥為務疾已復初顔氏家訓曰父母有疾子拜醫以求藥盖以醫者親之存亡所繫豈可傲忽也凡子事父母父母所愛亦當愛之所敬亦當敬之至於犬馬盡然而况於人乎凡子事父母樂其心不違其志樂其耳目安其寢處以其飲食忠養之幼事長賤事貴皆倣此凡子婦未敬未孝不可遽有憎疾姑教之若不可教然後怒之若不可怒然後笞之屢笞而終不改子放婦出然亦不明言其犯禮也子甚宜其妻父母不悦出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰凡為宫室必辨内外深宫固門内外不共井不共浴室不共厠男治外事女治内事男子晝無故不處私室婦人無故不窺中門男子夜行以燭婦人有故出中門必擁蔽其面如葢頭面帽之類男僕非有繕修及有大故謂水火盜賊之類不入中門入中門婦人必避之不可避亦謂如水火盗賊之類亦必以袖遮其面女僕無故不出中門有故出中門亦必擁蔽其面雖小婢亦然鈴下蒼頭但主通内外之言傳致内外之物毋得輙升堂室入庖廚凡卑幼於尊長晨亦省問夜亦安置丈夫唱喏婦人道萬福安置坐而尊長過之則起出遇尊長於塗則下馬不見尊長經再宿以上則再拜五宿以上則四拜賀冬至正旦六拜朔望四拜凡拜數或尊長臨時減而止之則從尊長之命吾家同居宗族衆多冬正朔望聚於堂上此假設南面之堂若宅舎異制臨時從宜丈夫處左西上婦人處右東上左右謂家長之左右皆北向共為一列各以長幼為序婦以夫之長幼為序不以身之長幼為序共拜家長畢長兄立於門之左長姊立於門之右皆南向諸弟妹以次拜訖各就列丈夫西上婦人東上共受畢幼拜以宗族多若人人致拜則不勝煩勞故同列共受之受拜訖先退後輩立受拜於門東西如前輩之儀若卑㓜自逺方至見尊長遇尊長三人以上同處者先共再拜叙寒暄問起居訖又三再拜而止晨夜唱喏萬福安置若尊長三人以上同處亦三而止皆所以避煩也凡受女壻及外甥拜立而扶之扶謂搊䇿外孫則立而受之可也凡節序及非時家宴上夀於家長卑㓜盛服序立如朔望之儀先再拜子弟之最長者一人進立於家長之前㓜者一人搢笏執酒盞立於其左一人搢笏執酒注立於其右長者搢笏跪斟酒祝曰伏願某官備膺五福保族宜家尊長飲畢授㓜者盞注反其故處長者出笏俛伏興退與卑幼皆再拜家長命諸卑㓜坐皆再拜而坐家長命侍者徧酢諸卑㓜諸卑㓜皆起序立如前俱再拜就坐飲訖家長命易服皆退易便服還復就坐凡子始生若為之求乳母必擇良家婦人稍温謹者乳母不良非惟敗亂家法兼令所飼之子性行亦類之子能食飼之敎以右手子能言教之自名及唱喏萬福安置稍有知則教之以恭敬尊長有不識尊卑長幼者則嚴訶禁之古有胎教况於己生子始生未有知固舉以禮况於已有知孔子曰㓜成若天性習慣如自然顔氏家訓曰教婦初來教子嬰孩故於其始有知不可不使之知尊卑長㓜之禮若侮詈父母毆擊兄姊父母不加訶禁反笑而奨之彼既未辨好惡謂禮當然及其既長習已成性乃怒而禁之不可復制於是父疾其子子怨其父殘忍悖逆無所不至盖父母無深識逺慮不能防㣲杜漸溺於小慈飬成其惡故也六嵗教之數謂一十百千萬與方名謂東西南北男子始習書字女始習女工之小者七嵗男女不同席不共食始誦孝經論語雖女子亦宜誦之自七嵗以下謂之孺子早寢晏起食無時八嵗出入門戸及即席飲食必後長者始教之以亷讓男子誦尚書女子不出中門九嵗男子誦春秋及諸史始為之講解使曉義理女子亦為之講解論語孝經及列女傳女戒之類略曉大意古之賢女無不觀圖史以自鑒如曹大家之徒皆精通經術議論明正今人或教女子以作歌詩執俗樂殊非所宜也十嵗男子出就外𫝊居宿於外讀詩禮傳為之講解使知仁義禮知信自是以往可以讀孟荀楊子博觀羣書凡所讀書必擇其精要者而讀之如禮記學記大學中庸樂記之類它書倣此其異端非聖賢之書傳宜禁之勿使妄觀以惑亂其志觀書皆通始可學文辭女子則教以婉娩娩音晚婉娩柔順貎聴從及女工之大者女工謂蠶桑織績裁縫及為飲膳不惟正是婦人之職兼欲使之知衣食所來之艱難不敢恣為奢麗至於纂組華巧之物亦不必習也未冠笄者質明而起總角靧靧音悔洗面也靣以見尊長佐長者供養祭祀則佐執酒食若既冠笄則皆責以成人之禮不得復言童㓜矣凡内外僕妾鷄初鳴咸起櫛總盥潄衣服男僕灑掃㕔事及庭鈴下蒼頭灑掃中庭女僕灑掃堂室設倚卓陳盥潄櫛靧之具主父主母既起則拂牀襞襞音璧疊衣也衾侍立左右以備使令退而具飲食得間則浣濯紉縫先公後私及夜則復拂牀展衾當晝内外僕妾惟主人之命各從其事以供百役凡女僕同輩謂兄弟所使謂長者為姊後輩謂諸子舎所使謂前輩為姨内則云雖婢妾衣服飲食必後長者鄭康成曰人貴賤不可以無禮故使之序長㓜務相雍睦其有闘争者主父主母聞之即訶禁之不止即杖之理曲者杖多一止一不止獨杖不止者凡男僕有忠信可任者重其禄能幹家事次之其専務欺詐背公徇私屡為盜竊弄權犯上者逐之凡女僕年滿不願留者縱之勤舊少過者資而嫁之其兩面二舌飾虚造䜛離間骨肉者逐之屢為盜竊者逐之放蕩不謹者逐之有離叛之志者逐之家禮卷一
