body:
  text: 家禮卷四宋朱子撰喪禮初終疾病遷居正寢凡疾病遷居正寢內外安靜以俟氣絶男子不絶於婦人之手婦人不絶於男子之手既絶乃哭復侍者一人以死者之上服嘗經衣者左執領右執要升屋中霤北面招以衣三呼曰某人復畢卷衣降覆尸上男女哭劈無數大上服謂有官則公服無官則襴衫皂衫深衣婦人袖背子呼某人者從生時之號立喪主凡主人謂長子無則長孫承重以奉饋奠其與賔客為禮則同居之親且尊者主之主婦謂亡者之妻無則主喪者之妻護喪以子弟知禮能幹者為之凡喪事皆稟之司書司貨以子弟或吏僕為之乃易服不食妻子婦妾皆去冠及上服被髮男子扱上衽徒跣餘有服者皆去華飾為人後者為本生父母及女子已嫁者皆不被髮徒跣諸子三日不食期九月之喪三不食五月三月之喪再不食親戚鄰里為糜粥以食之尊長強之少食可也紫扱上衽謂插衣前襟之帶華飾謂錦繡紅金玉珠翠之類治棺護喪命匠擇木為棺油杉為上柏次之土杉為下其制方直頭大足小僅取容身勿令高大及為虛簷高足內外皆用灰漆內仍用瀝清溶㵼厚半寸以上煉熟秫米灰鋪其底厚四寸許加七星版底四隅各釘大鐡環動則以大索貫而舉之必司馬公曰棺欲厚然太厚則重而難以致逺又不高大占地使壙中寬易致摧毁冝深戒之椁雖聖人所制自古用之然板木嵗久終歸腐爛徒使壙中寬大不能牢固不若不用之為愈也孔子葬鯉有棺而無椁又許貧者還葬而無椁今不欲用非為貧也乃欲保安亡者耳程子曰雜書有松脂入地千年為伏苓萬年為琥珀之説蓋物莫久於此故以塗棺古人已有用之者訃告於親戚僚友護喪司書為之發書若無則主人自訃親戚不訃僚友自餘書問悉停以書來弔者並須卒哭後答之沐浴襲奠為位飯含執事者設幃及牀遷尸掘坎執事者以幃幛卧內侍者設牀於尸牀前縱置之施簀去薦設席枕遷尸其上南首覆以衾掘坎於屏處潔地陳襲衣以卓子陳於堂前東壁下西領南上幅巾一充耳二用白纊如棗核大所以塞耳者也幎目帛方尺二寸所以覆面者也握手用帛長尺二寸廣五寸所以裹手者也深衣一大帶一履二袍襖汗衫袴襪勒帛裹肚之類隨所用之多少沐浴飯含之具以卓子陳於堂前西壁下南上錢三實於小箱米二升以新水淅令精實於碗櫛一沐巾一浴巾二上下體各用其一也乃沐浴侍者以湯入主人以下皆出帷外北靣侍者沐髮櫛之睎以巾撮為髻抗衾而浴拭以巾剪爪其沐浴餘水巾櫛棄於坎而埋之襲侍者設襲牀於幃外施薦席褥枕先置大帶深衣袍襖汗衫袴襪勒帛裏肚之類於其上遂舉以入置浴牀之西遷尸其上悉去病時衣及復衣易以新衣但未著幅巾深衣履徙尸牀置堂中間卑幼則各於室中間餘言堂者放此乃設奠執事者以卓子置脯醢升自阼階祝盥手洗盞斟酒奠於尸東當肩巾之祝以親戚為之主人以下為位而哭主人坐於牀東奠北衆男應服三年者坐其下皆藉以稿同姓期功以下各以服次坐於其後皆西面南上尊行以長幼坐於牀東北壁下南向西上藉以席薦主婦衆婦女坐於牀西藉以稿同姓婦女以服為次坐於其後皆東向南上尊行以長幼坐於牀西北壁下南向東上藉以席薦妾婢立於婦女之後别設幃以障內外異姓之親丈夫坐於帷外之東北向西上婦人坐於帷外之西北向東上皆藉以席以服為行無服在後上若內喪則同姓丈夫尊卑坐於帷外之東北向西異姓丈夫坐於帷外之西北向東上草三年之喪夜則寢於尸旁藉稿枕塊病羸者藉以薦可也期以下寢於側近男女異室外親歸家可也乃飯含主人哭盡哀左袒自前扱於腰之右盥手執箱以入侍者一人插匙於米碗執以從置於尸西以幎巾入徹枕覆面主人就尸東由足而西牀上坐東面舉巾以匙抄米實於尸口之右并實一錢又於左於中亦如之主人襲所袒衣復位侍者卒襲覆以衾加幅巾充耳設幎目納履乃襲深衣結大帶設握手乃覆以衾靈座魂帛銘旌置靈座設魂帛設椸於尸南覆以帕置倚卓其前結白絹為魂帛置倚上設香爐香合珓杯注酒果於卓子上侍者朝夕設櫛頮奉養之具皆如平生之司馬公曰古者鑿木為重以主其神今令式亦有然士民之家未嘗識也故用束帛依神謂之魂帛亦古禮之遺意也世俗皆畫影置於魂帛之後男子生時有畫像用之猶無所謂至於婦人生時深居閨門出則乘輜軿擁蔽其面既死豈可使畫工直入深室揭掩靣之帛執筆訾相畫其容貌此殊為非禮又世俗或用冠帽衣履裝飾如人狀此尤鄙俚不可從也立銘旌以絳帛為銘旌廣終幅三品以上九尺五品以下八尺六品以下七尺書曰某官某公之柩無官即隨其生時所稱以竹為杠如其長倚於靈座之右不作佛事司馬公曰世俗信浮屠誑誘於始死及七七日百日期年再期除喪飯僧設道場或作水陸大會寫經造像修建塔廟云為此者滅彌天罪惡必生天堂受種種快樂不為者必入地獄銼燒舂磨受無邉波吒之苦殊不知人生含氣血知痛癢或剪爪剃髮從而燒朽斫之已不知苦况於死者形神相離形則入於黃壤腐消滅與木石等神則飄若風火不知何之借使銼燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也苟不以至公行之雖鬼何得而治乎是以唐廬州刺史李丹與妹書曰天堂無則已有則君子登地獄無則已有則小人入世人親死而儔浮屠是不以其親為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎此則中智所共知而舉世滔滔信奉之何其易感而難燒也甚者至有傾家破産然後已與其如此曷若早賣田營墓而葬之乎彼天堂地獄若果有之當與天地俱生自佛法未入中國之前人死而復生者亦冇之矣何故無一人誤入地獄見閻羅等十王者耶不學者固不足言讀書知古者亦可以少悟矣執友親厚之人至是入哭可也主人未成服而來哭者當服深衣臨尸哭盡哀出拜靈座上香再拜遂弔主人相向哭盡哀主人以哭對無辭小斂袒哭括髮代免髽奠厥明謂死之明日執事者陳小斂衣衾以卓陳於堂東北壁下據死者所有之衣隨宜用之若多則不必盡用也衾用復者絞橫者三縱者一皆以細布或綵一幅而析其兩端為三橫者取足以周身相結縱者取足以掩首至足而結於身中設奠設卓子於阼階東南置奠饌及盞注於其上中之設盥盆帨巾各二於饌東其東有臺者祝所盥也其西無臺者執事者所盥也别以卓子設潔滌盆新拭巾於其東所以洗盞拭盞也此一節至遣並同具括髮麻免布髽麻括髮謂庥繩撮髻又以布為頭也免謂裂布或縫絹廣寸自項向前交於額上郤繞髻如著掠頭也髽亦用麻繩撮髻竹木為簮也設之皆於别室設小斂牀布絞衾衣設小斂牀施薦席褥於西階之西鋪絞衾衣舉之升自西階置於尸南先布絞之橫者三於下以備周身相結乃布縱者一於上以備掩首及足也衣或顛或倒但取正方唯上衣不倒乃遷襲奠執事者遷置靈座西南俟設新奠乃去之後凡奠皆放此遂小斂侍者盥手舉尸男女共扶助之遷於小斂牀上先去碗而舒絹疊衣以藉其首仍卷兩端以補兩肩空處又卷衣夾其兩脛取其正方然後以餘衣掩尸左衽不紐裹之以衾而未結以絞未掩其面蓋孝子猶俟其復生欲時見其面故也斂畢則覆以衾主人主婦憑尸哭劈主人西向憑尸哭劈主婦東向亦如之姑凡子於父母憑之父母於子夫於妻執之婦於舅奉之舅於婦撫之於昆弟執之凡憑尸父母先妻子後袒括髮免髽於别室男子斬衰者袒括髮齊衰以下至同五世祖者皆袒免於别室婦人髽於别室還遷尸牀於堂中執事者徹襲牀遷尸其處哭者復位尊長坐卑幼立乃奠祝帥執事者盥手舉饌升自阼階至靈座前祝焚香洗盞斟酒奠之卑幼者皆再拜侍者巾之主人以下哭盡哀乃代哭不絶聲大斂厥明小斂之明日死之第三日也不司馬公曰禮曰三日而斂者俟其復生也三日而生則亦不生矣故以三日為之禮也今貧者喪具或未辦或漆棺未乾雖過三日亦無傷也世俗以陰陽拘忌擇日而斂盛暑之際至有汁出蟲流豈不悖哉執事者陳大斂衣衾以卓子陳於堂東壁下衣無常數衾用有綿者設奠狊如小斂之儀舉棺入置於堂中少西執事者先遷靈座及小斂奠於旁側役者舉棺以入置於牀西承以兩凳若卑幼則於别室役者出侍者先置衾於棺中垂其裔於四外小司馬公曰周人殯於西階之上今堂室異制或狹故但於堂中少西而已今世俗多􅑼於僧舍無人守視往往以年月未利踰數十年不葬或為盜賊所發或為僧所棄不孝之罪孰大於此乃大斂侍者與子孫婦女俱盥手掩首結絞共舉尸納於棺中實生時所落髮齒及所剪爪於棺角又揣其空缺處卷衣塞之務令充實不可搖動謹勿以金玉珍玩置棺中啓盜賊心收衾先掩足次掩首次掩左次掩右令棺中平滿主人主婦憑哭盡哀婦人退入幕中乃召匠加蓋下釘徹牀覆柩以衣祝取銘旌設跗於柩東復設靈座於故處留婦人兩人守之當司馬公曰凡動尸舉柩哭劈無算然斂殯之際亦輟哭臨視務今安固不可但哭而已未按古者大斂而殯既大斂則纍墼塗之今或漆棺乾又南方土多螻蟻不可塗殯故從其便設靈牀於柩東牀帳薦席屏枕衣被之屬皆如平生時乃設奠如小斂之儀主人以下各歸喪次中門之外擇朴陋之室為丈夫喪次斬衰寢苫枕塊不脫絰帶不與人坐焉非時見乎母也不及中門齊衰寢席大功以下異居者既殯而歸居宿於外三月而復寢婦人次於中門之內别室或居殯側去帷帳衾褥之華麗者不得輒至男子喪次止代哭者成服厥明大斂之明日死之第四日也五服之人各服其服入就位然後朝哭相弔如儀其服之制一曰斬衰三年斬不緝也衣裳皆用極粗生布旁及下際皆不緝也裳前三幅後四幅縫內向前後不連每幅作三謂屈其兩邉相著而空其中也衣長過腰足以掩裳上際縫外向背有負版用布方尺八寸綴於領下垂之前當心有衰用布長六寸廣四寸綴於左襟之前左右有辟領各用布方八寸屈其兩頭相著為廣四寸綴於領下在負版兩旁各攙負版一寸兩腋下有衽各用布三尺五寸上下各留一尺正方一尺之外上於左旁裁入六寸下於右旁裁入六寸便於盡處相望斜裁却以兩方左右相沓綴於衣兩旁垂之向下狀如燕尾以掩裳旁際也冠比衣裳用布稍細紙糊為材廣三寸長足跨頂前後裹以布為三陬皆向右縱縫之用麻繩一條從額上約之至頂後交過前各至耳結之以為武屈冠兩頭入武內向外反屈之縫於武武之餘繩垂下為纓結於頥下首絰以有子麻為之其圍九寸麻本在左從額前向右圍之從頂過後以其末加於本上又以繩為纓以固之如冠之制腰絰大七寸有餘兩股相交兩頭結之各存麻木散垂三尺其交結處兩旁各綴細繩繫之絞帶用有子麻繩一條大半腰絰中屈之為兩股各一尺餘乃合之其大如絰圍腰從左過後至前乃以其右端穿兩股間而反插於右在絰之下其杖用竹髙齊心本在下屨亦粗麻為之婦人則用極粗生布為大袖長裙蓋頭皆不緝布頭􅔮竹叉麻屨衆妾則以背子代大袖凡婦人皆不杖其正服則子為父也其加服則嫡孫父卒為祖若曾髙祖承重者也父為嫡子當為後者也其義服則婦為舅也夫承重則從服也為人後者為所後父也為所後祖承重也夫為人後則妻從服也妻為夫也妾為君也二曰齊衰三年齊緝也其衣裳冠制並如斬衰但用次等粗生布緝其旁及下際冠以下為武及纓首絰以無子庥為之大七寸餘本在右末繫本下布纓腰絰大五寸餘絞帶以布為之而屈其右端尺餘丈以桐為之上圓下方婦人服同斬衰但布用次等為異後皆放此其正服則子為母也士之庶子為其母同而為父後則降也其加服則嫡孫父卒為祖母若曽髙祖母承重者也母為嫡子當為後者也其義服則婦為姑也夫承重則從服也為繼母也為慈母謂庶子無母而父命他妾之無子者慈已也繼母為長子也妾為君之長子也杖期服制同上但又用次等生布其正服則嫡孫父卒祖在為祖母也其服降則為嫁母出母也其義服則為父卒繼母嫁而已從之者也夫為妻也子為父後則為出母嫁母無服繼母出則無服也不杖期服制同上但不杖又用次等生布其正服則為祖父母女雖適人不降也庶子之子為父之母而為祖後則不服也為伯叔父也為兄弟也為衆子男女也為兄弟之子也為姑姊妹女在室及適人而無夫與子者也婦人無夫與子者為其兄弟姊妹及兄弟之子也妾為其子也其加服則為嫡孫若曾元孫當為後者也女適人者為兄弟之為父後者也其降服則嫁母出母為其子子雖為父後猶服也妾為其父母也其義服則繼母嫁母為前夫之子從已者也為伯叔母也為夫兄弟之子也繼父同居父子皆無大功之親者也妾為女君也妾為君之衆子也舅姑為嫡婦也五月服制同上其正服則為曾祖父母女適人者不降也三月服制同上其正服則為髙祖父母女適人者不降也其義服則繼父不同居者謂先同今異或雖同居而繼父有子已有大功以上親者也其元不同居者則不服三曰大功九月服制同上但用稍粗熟布無負版衰辟領首絰五寸餘腰絰四寸餘其正服則為從父兄弟姊妹謂伯叔父之子也為衆孫男女也其義服則為衆子婦也為兄弟子之婦也為夫之祖父母伯叔父母兄弟子之婦也夫為人後者其妻為本生舅姑也四曰小功五月服制同上但用稍熟細布冠左縫首絰四寸餘腰絰三寸餘其正服則為從祖祖父從祖祖姑謂祖之兄弟姊妹也為兄弟之孫為從祖父從祖姑謂從祖祖父之子父之從父也為從父兄弟之子也為從祖兄弟姊妹謂從祖父之子所謂再從兄弟姊妹者也為外祖父母謂母之父母也為舅謂母之兄弟也為甥也為從母謂母之姊妹也為姊妹之子也為同母異父之兄弟姊妹也其義服則為從祖祖母也為夫兄弟之孫也為從祖母也為夫從兄弟之子也為夫之姑姊妹適人者不降也女為兄弟姪之妻已適人亦不降也為娣姒婦謂兄弟之妻相名長婦謂次婦曰娣婦娣婦謂長婦曰姒婦也庶子為嫡母之父母兄弟姊妹嫡母死則不服也母出則為繼母之父母兄弟姊妹也為庶母慈己者謂庶母之乳養己者也為嫡孫若曾元孫之當為後者之婦其姑在則否也為兄弟之妻也為夫之兄弟也五曰緦麻三月服制同上但用極細熟布首絰三寸腰絰二寸並用熟麻纓亦如之其正服則為族曾祖父族曾祖姑謂曾祖之兄弟姊妹也為兄弟之曾孫也為族祖父族祖姑謂族曾祖父之子也為從父兄弟之孫也為族父族姑謂族祖父之子也為從祖兄弟之子也為族兄弟姊妹謂族父之子所謂三從兄弟姊妹也為曾孫元孫也為外孫也為從母兄弟姊妹謂從母之子也為外兄弟謂姑之子也為內兄弟謂舅之子也其降服則庶子為父後者為其母而為其母之父母兄弟姊妹則無服也其義服則為族曾祖母也為夫兄弟之曾孫也為族祖母也為夫從兄弟之孫也為族母也為夫從祖兄弟之子也為庶孫之婦也士為庶母謂父妾之有子者也為乳母也為壻也為妻之父母妻亡而别娶亦同即妻之親母雖嫁出猶服也為夫之曾祖髙祖也為夫之從祖祖父母也為兄弟孫之婦也為夫兄弟孫之婦也為夫之從祖父母也為從父兄弟子之婦也為夫從兄弟子之婦也為夫從父兄弟之妻也為夫之從父姊妹適人者不降也為夫之外祖父母也為夫之從母及舅也為外孫婦也女為姊妹之子婦也為甥婦也凡為殤服以次降一等凡年十九至十六為長殤十五至十二為中殤十一至八嵗為下殤應服期者長殤降服大功九月中殤七月下場小功五月應服大功以下以次降等不滿八嵗為無服之殤哭之以日易月生未三月則不哭也男子已娶女子許嫁皆不為殤凡男為人後女適人者為其私親皆降一等私親之為之也亦然女適人者降服未滿被出則服其本服已除則不復服也凡婦服夫黨當喪而出則除之凡妾為其私親則如衆人成服之日主人及兄弟始食粥諸子食粥妻妾及期九月疏食水飲不食菜果五月三月者飲酒食肉不與宴樂自是無故不出若以喪事及不得已而出入則乘朴馬布鞍素轎布簾凡重喪未除而遭輕喪則制其而哭之月朔設位服其服而哭之既畢返重服其除之也亦服輕服若除重喪而輕服未除則服輕服以終其餘日朝夕哭奠上食朝奠每日晨起主人以下皆服其服入就位尊長坐哭卑者立哭侍者設盥櫛之具於靈牀側奉魂帛出就靈座然後朝奠執事者設蔬果脯醢祝盥手焚香斟酒主人以下再拜哭盡哀食時上食如朝奠儀夕奠如朝奠儀卑主人以下奉魂帛入就靈牀哭盡哀哭無時朝夕之間哀至則哭於喪次朔日則於朝奠設饌饌用肉魚麵米食羮飯各一器禮如朝奠之儀有新物則薦之如上食儀弔奠􅉠凡弔皆素服幞頭衫帶皆以白生絹為之奠用香茶燭酒果有狀或用食物即别為文賻用錢帛有狀惟親友分厚者有之具刺通名賓主皆有官則具門狀否則名紙題其陰面先使人通之與禮物俱入入哭奠訖乃弔而退既通名喪家炷火然燭布席皆哭以俟護喪出迎賓入至廳事進揖曰竊聞某人傾背不勝驚怛敢請入酹并伸慰意護喪引賓入至靈座前哭盡哀再拜焚香跪酹茶酒俯伏興護喪至哭者祝跪讀祭文奠􅉠狀於賓之右畢興賓主皆哭盡哀實再拜主人哭出西向稽顙再拜賓亦哭東向答拜進曰不意凶變某親某官奄忽傾背伏惟哀慕何以堪處主人對曰某罪逆深重禍延某親伏蒙奠酹并賜臨慰不勝哀感又再拜賓答拜又相向哭盡哀賓先止寬譬主人曰修短有數痛毒奈何願抑孝思俯從禮制乃揖而出主人哭而入護喪送至廳事茶湯而退主人以下止哭若亡者官尊即云薨逝稍尊即云捐館生者官尊則云奄棄榮養存亡俱無官即云色養若尊長拜賔禮亦同此惟其辭各如啓狀之式見卷末聞喪奔喪始聞親喪哭親謂父母也以哭答使者又哭盡哀問故易服裂布為四腳白布衫繩帶麻屨遂行日行百里不以夜行雖哀戚猶辟害也道中哀至則哭哭避市邑喧繁之處哭司馬公曰今人奔喪及從柩行者遇城邑則過則止是飾詐之道也望其州境其縣境其城其家皆哭家不在城則望其鄉哭入門詣柩前再拜再變服就位哭初變服如初喪柩東西面坐哭盡哀又變服如小斂亦如之後四日成服與家人相弔賓至拜之如初若未得行則為位不奠設椅子一枚以代尸柩左右前後設位哭如儀但不設奠若喪側無子孫則此中設奠如儀變服亦以聞後之第四日在道至家皆如上儀若喪側無子孫則在道朝夕為位設奠至家但不變服其相弔拜賓如儀若既葬則先之墓哭拜之墓者望墓哭至墓哭拜如在家之儀未成服者變服於墓歸家詣靈座前哭拜四日成服如儀已成服者亦然但不變服齊衰以下聞喪為位而哭尊長於正堂卑幼於别室喪司馬公曰今人皆擇日舉哀凡悲哀之至在初聞即當哭之何暇擇日但法令有不得於州縣公廨舉哀之文則在官者當哭於儈舍其它皆哭於本家可也若奔喪則至家成服奔喪者釋去華盛之服裝辦即行既至齊衰望鄉而哭大功望門而哭小功以下至門而哭入門詣柩前哭再拜成服就位哭弔如儀若不奔喪則四日成服不奔喪者齊衰三日中朝夕為位會哭四日之朝成服亦如之大功以下始聞喪為位會哭四日成服亦如之皆每月朔為位會哭月數既滿次月之朔乃為位會哭而除之其間哀至則哭可也治葬三月而葬前期擇地之可葬司馬公曰古者天子七月諸侯五月大夫三月士踰月而葬今五服年月敕王公以下皆三月而葬然世俗信葬師之説既擇年月日時又擇山水形勢以為子孫貧富貴賤賢愚夀夭盡繫於此而其為術又多不同爭論紛紜無時可決至冇終身不葬或纍世不葬或子孫衰替忘失處所遂棄捐不葬者正使殯葬實能致人禍福為子孫者亦豈忍使其親臭腐暴露而自求其利耶悖禮傷義無過於此然孝子之心慮患深逺恐淺則為人所抇深則濕潤速朽故必求土厚小深之地而葬之所以不可不擇也或曰家貧鄉逺不能歸葬則如之何公曰子遊問喪具夫子曰稱家之有亡子遊曰有亡烏乎齊夫子曰有無過禮苟亡矣斂手足形還葬懸棺而窆人豈有非之者哉昔亷范千里負喪郭平自賣營墓豈待豐富然後葬其親哉在禮未葬不變服食粥居廬寢苫枕塊蓋閔親之未冇所歸故寢食不安奈何舍之出逰食稻衣錦不知其何以為心哉世人又有逰宦沒於逺方子孫火焚其柩收燼歸葬者夫孝子愛親之肌體故斂而藏之殘毁它人之尸在律猶嚴况子孫乃悖謬如此其始蓋出於羌胡之俗浸染中華行之既久習以為常見者恬然曾莫之怪豈不哀哉延陵季子適齊其子死葬於嬴博之間孔子以為合禮必也不能歸葬葬於其地可也豈不猶愈於焚之哉抇音骨惡音烏齊子細切窆彼斂反程子曰卜其宅兆卜其地之美惡也非陰陽家所謂禍福者也地之美則其神靈安其子孫盛若培壅其根而枝葉茂理固然矣地之惡者則反是然則曷謂地之美者土色之光潤草木之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位決日之凶吉不亦泥乎甚者不以奉先為計而専以利後為慮尤非孝子安厝之用心也惟五患者不得不謹須使它曰不為道路不為城郭不為溝池不為貴勢所奪不為耕犁所及也一夲云所謂五患者溝渠道路避村落逺井窖愚按古者葬地葬日皆決於卜筮今人不曉占法且從俗擇之可也擇日開塋域祠后土主人既朝哭帥執事者於所得地掘兆四隅外其壤掘中南其壤各立一標當南門立兩標擇逺親或賔客一人告后土氏祝帥執事者設位於中標之左南向設盞注酒果脯醢於其前又設盥盆帨巾二於其東南其東有臺架告者所盥其西無者執事者所盥也告者吉服入立於神位之前北向執事者在其後東上皆再拜告者與執事者皆盥帨執事者一人取酒注西向跪一人取盞東向跪告者斟酒反注取盞酹於神位前俯伏興少退立祝執版告於告者之左東向跪讀之曰維某年嵗月朔日子某官姓名敢告於后土氏之神今為某官姓名營建宅兆神其保佑俾無後艱謹以清酌酺醢祗薦於神尚饗訖復位告者再拜祝及執事者皆再拜徹出主人若歸則靈座前哭再拜後放此遂穿壙司馬公曰今人葬有二法有穿地直下為壙而懸棺以窆者有鑿隧道旁穿土室而攛柩於其中者按古者唯天子得為隧道其它皆直下為壙而懸棺以窆今當以此為法其穿地宜狹而深狹則不崩損深則盜難近也作灰隔穿壙既卑先布炭末於壙底築實厚二三寸然後布石灰細沙黃土拌勻者於其上灰三分二者各一可也築實厚二三寸别用薄板為灰隔如椁之狀內以瀝清塗之厚三寸許中取容棺墻高於棺四寸許置於灰上乃於四旁旋下四物亦以薄板隔之炭末居外三物居內如底之厚築之既實則旋抽其板近上復下炭灰等而築之反墻之平而止蓋既不用椁則無以容瀝清故為此制又炭禦木根辟水蟻石灰得沙而實得土而黏歲久結為全石螻蟻盜賊皆不能進也程子曰古人之葬欲比化不使土親膚今竒玩之物尚保藏固密以防損汚況親之遺骨當如何哉世俗淺識惟欲不見而已又有求速化之説者是豈知必誠必信之義且非欲求其不化也未化之間保藏當如是耶刻志石用石二片其一為蓋刻云有宋某官某公之墓無官者則書其字曰某君某甫其一為底刻云有宋某官某公諱某字某某州某縣人考諱某某官母氏某封某某年月日生敘歷官遷次某年月日終某年月日葬於某鄉某里某處娶某氏某人之女子男某某官女適某官某人婦人夫在則蓋云有宋某官姓名某封某氏之墓無封則云妻夫無官則書夫之姓名夫亡則云某官某公某封某氏夫無官則云某君某甫妻某氏其底敘年若干適某氐因夫子致封號無則否葬之曰以二石字而相向而以鐵束束之埋之壙前近地面三四尺間蓋慮異時陵谷變遷或誤為人所動而此石先見則人有知其姓名者庶能為掩之也造明器刻木為車馬僕從侍女各執奉養之物象平生而小準令五品六品三十事七品八品二十事非升朝官十五事下帳謂牀帳茵席倚卓之類亦象平生而小苞竹掩一以盛遣奠餘脯筲竹器五以盛五榖罌梵器三以盛酒脯醢便司馬公曰自明器以下俟寶土及半乃於其旁穿房以貯之愚按此雖古人不忍死其親之意然實非有用之物且脯肉腐敗生蟲聚蟻尤為非便雖不可用也大輿古者柳居制度甚詳今不能然但從俗為之取其牢固平穩而已其法用兩長杠杠上加伏兔附杠處為圓鑿别作小方牀以載柩足高二寸旁立兩柱柱外施圓枘令入鑿中長出其外枘鑿之間須極圓滑以膏塗之使其上下之際柩常適平兩柱近上更為方鑿加橫扄扄兩頭出柱外者更加小扄杠兩頭施橫杠橫杠上施短杠短杠上或更加小杠仍多作新麻大索以備札縳此皆切要實用不可闕者但如此制而以衣覆棺亦足以少華道路或更欲加飾則以竹為之格以綵結之上如撮蕉亭施帷幔四角垂流蘇而已然亦不可太高恐多罣礙不須太華徒為觀美若道路逺決不可為此虛飾但多用油單裹柩以防雨水而已翣以木為筐如扇而方兩角高廣二尺高二尺四寸衣以白布柄長五尺黼翣畫黼黻翣畫黻畫翣畫雲氣其緣皆為雲氣皆畫以紫準格作主程子曰作主用栗趺方四寸厚寸二分鑿之洞底以受主身身高尺二寸博三寸厚寸二分剡上五分為圓首寸之下勒前為頷而判之四分居前八分居後頷下陷中長六寸廣一寸深四分合之植於趺下齊竅其旁以通中圓徑四分居三寸六分之下下距趺面七寸二分以粉塗其前面司馬公曰府君夫人共為一櫝便愚按古者虞主用桑將練而後易之以栗今於此作栗主以從簡便或無栗止用木之堅者櫝用黑漆且容一主夫婦俱入祠堂乃如司馬氏之制遷柩朝祖奠􅉠陳器祖奠發引前一日因朝奠以遷柩告設饌如朝奠祝斟酒訖北面跪告曰今以吉辰遷柩敢告俯伏興主人以下哭盡衰再拜蓋古有啓殯之奠今既不塗殯則其禮無所施然又不可全無節文故為此禮也奉柩朝於祖將遷柩役者入婦人退避主人及衆主人輯杖立視祝以箱奉魂帛前行詣祠堂前執事者奉奠及倚卓次之銘旌次之役者舉柩次之主人以下從哭男子由右婦人由左重服在前輕服在後服各為敘侍者在末無服之親男居男右女居女左皆次主人主婦之後婦人皆蓋頭至祠堂前執事者先布席役者致柩於其上北首而出婦人去蓋頭祝帥執事者設靈座及奠於柩西東向主人以下就位立哭盡哀止此禮蓋象平生將出必辭尊者也遂遷於廳事執事者設帷於廳事役者入婦人退避祝奉魂帛導柩右旋主人以下男女哭從如前詣廳事執事者布席役者置柩於席上南首而出祝設靈座及奠於柩前南向主人以下就位作哭藉以薦席乃代哭如未殮之前以至發引親賓致奠賻如初喪儀陳器方相在前狂夫為之冠服如道士執戈揚盾四品以上四目為方相以下兩目為魌頭次明器下帳苞筲罌以牀舁之次銘旌去跗執之次靈車以奉魂帛香火次大輿輿旁有翣使人執之日晡時設祖奠饌如朝奠祝斟酒訖北向跪告曰永遷之禮靈辰不留今奉柩車式遵祖道俯伏興餘如朝夕奠儀司馬公曰若柩自它所歸葬則行日但設朝奠哭而行至葬乃備此及下遣奠禮遣奠厥明遷柩就輿輿夫納大輿於中庭脫柱上撗扄執事者徹祖奠祝北向跪告曰今遷柩就輿敢告遂遷靈座置旁側婦人退避役夫遷柩就輿乃施扄加楔以索維之令極牢實主人從柩哭降視載婦人哭於帷中載畢祝帥執事者遷靈座於柩前南向乃設遣奠饌如朝奠冇脯惟婦人不在奠畢執事者徹脯納苞中置舁牀上遂徹奠祝奉魂帛升車焚香别以箱盛主置帛後至是婦人乃蓋頭出帷降階立哭守舍者哭辭盡哀再拜而歸尊長則不拜發引柩行方相等前導如陳器之敘主人以下男女哭步從如朝祖之敘出門則以白幕夾障之尊長次之無服之親又次之賓客又次之皆乘車馬親賓或先待於墓所或出郭哭拜辭歸親賓設幄於郭外道旁駐柩而奠如在家之儀塗中遇哀則哭若墓逺則每舍設靈座於柩前朝夕哭奠食時上食夜則主人兄弟皆宿柩旁親戚共守衛之及墓下棺祠后土題木主成墳未至執事者先設靈幄在墓道西南向有倚卓親賓次在靈幄前十數步男東女西女次北與靈幄相直皆南向婦人幄在靈幄後壙西方相至以戈繫壙四隅明器等至陳於壙東南北上靈車至祝奉魂帛就幄座主箱亦置帛後遂設奠而退酒果脯醢柩至執事者先布席於壙南柩至脫載置席上北首執事者取銘旌去杠置柩上主人男女各就位哭主人諸丈夫立於壙東西向主婦諸婦女立於壙西幄內東向皆北上如在塗之儀賓客拜辭而歸主人拜之賓答拜乃窆先用木杠橫於灰隔之上乃用索四條穿柩底鐶不結而下之置杠上則抽索去之别摺細布若生絹兜柩底而下之更不抽出但裁其餘棄之若柩無鐶即用索兜柩底兩頭放下至杠上乃去索用布如前大凡下柩最須詳審用力不可誤有傾墜動搖主人兄弟宜輟哭親臨視之已下再整柩衣銘旌令平正主人贈玄六纁四各長丈八尺主人奉置柩旁再拜稽顙在位者皆哭盡哀家貧或不能具此數則玄纁各一可也其餘金玉寶玩並不得入壙以為亡者之纍加灰隔內外蓋先度灰隔大小制薄板一片旁距四墻取令吻合至是加於柩上更以油灰彌之然後旋旋少灌瀝清於其上令其速凝即不透板約以厚三寸許乃加外蓋實以灰三物拌勻者居下炭末居上各倍於底及四旁之厚以酒灑而躡實之恐震柩中故未敢築但多用之以俟其實爾乃實土而漸築之下土每尺許即輕手築之勿令震動柩中祠后土於墓左如前儀祝板前同但云今為某官封諡窆茲幽宅神其後同藏明器等實土及半乃藏明器下帳苞筲罌於侵房以版塞其門下志石墓在平地則於壙內近南先布磚一重置石其上又以磚四圍之而覆其上若墓在山側峻處則於壙南數尺間掘地深四五尺依此法埋之復實以土而堅築之下土亦以尺許為凖但須密杵堅築題主執事者設卓子於靈座東南西向置硯筆墨對卓置盥盆帨巾如前主人立於其前北向祝盥手出主卧置卓上使善書者盥手西向立先題陷中父則曰宋故某官某公湋某字某第幾神主粉面曰皇考某官封諡府君神主其下左旁曰孝子某奉祀母則曰宋故某封某氏諱某字某第幾神主粉靣曰皇妣某封某氏神主旁亦如之無官封則以生時所稱為號題畢祝奉置靈座而藏魂帛於箱中以置其後炷香斟酒執板出於主人之右跪讀之曰子同前但云孤子某敢昭告於皇考某官封諡府君形歸窆穸神返室堂神主既成伏惟尊靈舍舊從新是憑是依畢懷之興復位主人再拜哭盡哀止母喪稱哀子後放此凡冇封諡皆稱之後皆放此祝奉神主升車魂帛箱在其後執事者徹靈座遂行主人以下哭從如來儀至墓門尊長乘車馬去墓百步許卑幼亦乘車馬但留子弟一人監視實土以至成墳墳高四尺立小石碑於其前亦高四尺趺高尺許司馬公曰按令式墳碑石獸大小多寡雖各有品數然葬者當為無窮之規後世見此等物安知其中不多藏金玉邪是皆無益於亡者而反有害故令式又有貴得同賤賤不得同貴之文然則不若不用之為愈也馬今按孔子防墓之封其崇四尺故取以為法用司公説别立小碑但石須濶尺以上其厚居三之二圭首而刻其面如志之蓋乃略述其世系名字行實而刻於其左轉及後右而周焉婦人則俟夫葬乃立面如夫之志蓋之刻云反哭主人以下奉靈車在塗徐行哭其反如疑為親在彼哀至則哭至家哭望門即哭祝奉神主入置於靈座執事者先設靈座於故處祝奉神主入就位櫝之并出魂帛箱置主後主人以下哭於廳事主人以下及門哭入升自西階哭於廳事婦人先入哭於堂遂詣靈座前哭盡哀止有弔者拜之如初謂賓客之親密者既歸待反哭而復弔檀弓曰反哭之弔也哀之至也反而亡焉失之矣於是為甚期九月之喪者飲酒食肉不與宴樂小功以下大功異居者可以歸虞祭葬之日日中而虞或墓逺則但不出是日可也若去家經宿以上則初虞於所館行之鄭氏曰骨肉歸於土魂氣則無所不之孝子為其倣徨三祭以安之主人以下皆沐浴或已晚不暇即略自澡潔可也執事者陳器具饌盥盆帨巾各二於西階西東南上東盆有臺巾有架西者無之凡喪禮皆放此酒瓶并架一於靈座東南置卓子於其東設注子及盤盞於其上火爐湯瓶於靈座西南置卓子於其西設祝版於其上設蔬果盤盞於靈座前卓上七筯居內當中酒盞在其西醋楪居其東果居外蔬居果內實酒於瓶設香桉於堂中炷火於香爐束茅聚沙於香案前具饌如朝奠陳於堂門外之東祝出神主於座主人以下皆入哭主人及兄弟倚杖於室外及與祭者皆入哭於靈座前其位皆北面以服為列重者居前輕者居後尊長坐卑幼立丈夫處東西上婦人處西東上逐行各以長幼為序侍者在後降神祝止哭者主人降自西階盥手帨手詣靈座前焚香再拜執事者皆盥帨一人開酒實於注西面跪以注授主人主人跪受一人奉卓上盤盞東面跪於主人之左主人斟酒於盞以注授執事者左手取盤盞右手執盞酹之茅上以盤上授執事者俯伏興少退再退復位祝進饌執事者佐之其設之敘如朝奠初獻主人進詣注子卓前執注北向立執事者一人取靈座前盤盞立於主人之左主人斟酒反注於卓子上與執事者俱詣靈座前北向立主人跪執事者亦跪進盤盞主人受盞三祭於茅束上俯伏興執事者受盞奉詣靈座前奠於故處祝執版出於主人之右西向跪讀之前同但云日月不居奄及初虞夙興夜處哀慕不寧謹以潔牲柔毛粢盛醴齊哀薦祫事尚饗祝興主人哭再拜復位哭止牲用豕則曰剛鬛不用牲則曰清酌庶羞夾合也欲其合於先祖也亞獻主婦為之禮如初但不讀祝四拜終獻親賓一人或男或女為之禮如亞獻侑食執事者執注就添盞中酒主人以下皆出祝闔門主人立於門東西向卑幼丈夫在其後重行北上主婦立於門西東向卑幼婦女亦如之尊長休於它所如食間祝啓門主人以下入哭辭神祝進當門北向噫歆告啓門三乃啓門主人以下入就位執事者點茶祝立於主人之右西向告利成斂主匣之置故處主人以下哭再拜盡哀止出就次執事者徹祝埋魂帛祝取魂帛帥執事者埋於屏處潔地罷朝夕奠朝夕哭哀至哭如初遇柔日再虞乙丁巳辛癸為柔日其禮如初虞惟前期一日陳器具饌厥明夙興設蔬果酒饌質明行事祝出神主於座祝辭改初虞為再虞祫事為虞事為異若墓逺途中遇柔日則亦於所館行之遇剛日三虞甲丙戊庚壬為剛日其禮如再虞惟改再虞為三虞虞事為成事若墓逺亦途中遇剛日且闕之須至家乃可行此祭卒哭檀弓曰卒哭曰成事是日也以吉祭易喪祭故此祭漸用吉禮三虞後遇剛日卒哭前期一日陳器具饌並同虞祭帷更設玄酒瓶一於酒瓶之西厥明夙興設蔬果酒饌並同虞祭唯更取井花水充玄酒質明祝出主同再虞主人以下皆入哭降神並同虞祭主人主婦進饌主人奉魚肉主婦盥帨奉麵米食主人奉羮主婦奉飯以進如虞祭之設初獻並同虞祭惟祝執版出於主人之左東向跪讀為異詞並同虞祭但改三虞為卒哭哀薦成事下云來日隮祔於祖考某官府君尚饗也按此云祖考謂亡者之祖考亞獻終獻侑食闔門啓門辭神並同虞祭唯祝西階上東靣告利成自是朝夕之間哀至不哭猶朝夕哭主人兄弟蔬食水飲不食菜果寢席枕木祔檀弓曰商既練而祔周卒哭而祔孔子善商注曰期而神之人情然商禮既亡其本末不可考今三虞卒哭皆用周禮次第則此不得獨從商禮卒哭明日而祔卒哭之祭既徹即陳器具饌器如卒哭唯陳之於祠堂堂狹即於廳事隨便設亡者祖考妣位於中南向西上設亡者位於其東南西向母喪則不設祖考位酒瓶玄酒瓶於阼階上火爐湯瓶於西階上具饌如卒哭而三分母喪則兩分祖妣二人以上則以親者配雜記曰男子祔於王父則配女子祔於王母則不注云有事於尊者可以及卑有事於卑者不敢援尊也厥明夙興設菜果酒饌並同卒哭質明主人以下哭於靈座前主人兄弟皆倚杖於階下入哭盡哀止用按此謂繼祖宗子之喪其世嫡當為後者主喪乃此禮若喪主非宗子則皆以亡者繼祖之宗主此祔祭禮注云祔於祖廟宜使尊者主之詣祠堂奉神主出置於座祝軸簾啓櫝奉所祔祖考之主置於座內執事者奉祖妣之主置於座西上若在它所則置於西階上卓子上然後啓櫝告若喪主非宗子而與繼祖之宗異居則宗子為於祖而設虛位以祭祭訖除之還奉新主入祠堂置於座主人以下還詣靈座所哭祝奉主櫝詣祠堂西階上卓子上主人以下哭從如從柩之敘至門止哭祝啓櫝出主如前儀若喪主非宗子則唯喪主主婦以下還迎敘立若宗子自為喪主則敘立如虞祭之儀若喪主非宗子則宗子主婦分立兩階之下喪主在宗子之右喪主婦在宗子婦之左長則居前少則居後餘亦如虞祭之儀參神在位者皆再拜恭祖考妣降神若宗子自為喪主則喪主行之若喪主非宗子則宗子行之並同卒哭祝進饌並同虞祭初獻若宗子自為喪主則喪主行之若喪主非宗子則宗子行之並同卒哭但酌獻先詣祖考妣前日子前同卒哭祝版但云孝子某謹以潔牲柔毛粢盛醴齊適於皇某考某官府君隮祔孫某官尚饗皆不哭內喪則云皇某妣某封某氏隮祔孫婦某封某氏次詣亡者前若宗子自為喪主則祝版同前但云薦祔事於先考某官府君適於皇某考某官府君尚饗若喪主非宗子則隨宗子所稱若亡者於宗子為卑幼則宗子不拜亞獻終獻若宗子自為喪主則主婦為亞獻親賓為終獻若喪主非宗子則喪主為亞獻主婦為終獻並同卒哭及初獻儀惟不讀祝侑食闔門啓門辭神並同卒哭但不哭祝奉主各還故處祝先納祖考妣神主於龕中匣之次納亡者神主西階卓子上匣之奉之反於靈座出門主人以下哭從如來儀盡哀止若喪主非宗子則哭而先行宗子亦哭送之盡哀止若祭於它所則祖考妣之主亦如新主納之小祥鄭氏云祥吉也期而小祥自喪至此不計閏凡十三月古者卜曰而祭今止用初忌以從簡易大祥放此前期一日主人以下沐浴陳器具饌主人帥衆丈夫灑掃滌濯主婦帥衆婦女滌釜鼎具祭饌它皆如卒哭之禮設次陳練服丈夫婦人各設次於别所置練服於其中男子以練服為冠去首絰負版辟領衰婦人截長裙不令曵地應服期者改吉服然猶盡其月不服金珠錦繡紅紫唯為妻者猶服􅎭盡十五月而除厥明夙興設蔬果酒饌並同卒哭質明祝出主主人以下入哭皆如卒哭但主人倚杖於門外與期親各服其服而入若已除服者來預祭亦釋去華盛之服皆哭盡哀止乃出就次易服復入哭祝止之降神如卒哭三獻如卒哭之儀祝版同前但云日月不居奄及小祥夙興夜處小心畏忌不惰其身哀慕不寧敢用潔牲柔毛粢盛醴齊薦此常事尚饗侑食闔門啓門辭神皆如卒哭之儀止朝夕哭惟朔望未除服者會哭其遭喪以來親戚之未嘗相見者相見雖已除服猶哭盡哀然後許拜始食菜果大祥再期而大祥自喪至此不計閏凡二十五月亦止用第二忌日祭前期一日沐浴陳器具饌皆如小詳設次陳禫服司馬公曰丈夫垂腳黲紗幞頭黲布衫布裹角帶未大祥間假以出謁者婦人冠梳假髻以鵝黃青碧皂白為衣履其金珠紅繡皆不可用告遷於祠堂以酒果如朔日之儀無親盡之祖則祝版而云云使其主祭告訖改題神主如加贈之儀遞遷而西虛東一龕以俟新主若有親盡之祖而其别子也則祝版云云告畢而遷於墓所不埋其支子也而族人有親未盡者則祝版云云告畢遷於最長之房使主其祭其餘改題遞遷如前若親皆已盡則祝版云云告畢埋於兩階之間其餘改題遞遷如前厥明行事皆如小祥之儀惟祝版改小祥曰大祥常事曰祥事畢祝奉神主入於祠堂主人以下哭從如祔之敘至祠堂前哭止徹靈座斷杖棄之屏處奉遷主埋於墓側始飯酒食肉而復寢禫鄭氏曰淡淡然平安之意大祥之後中月而禫間一月也自喪至此不計閏凡二十七月前一月下旬卜日下旬之首擇來月三旬各一日或丁或亥設卓子於祠堂門外置香爐香合㺽珓盤子於其上西向主人禫服四向衆主人次之少退北上子孫在其後重行北上執事者北向東上主人炷香燻珓命以上旬之日曰某將以來月某日祗薦禫事於先考某官府君尚饗即以珓擲於盤以一俯一仰為吉不吉更命中旬之日又不吉則用下旬之日主人乃入祠堂本龕前再拜在位者皆再拜主人焚香祝執辭立於主人之左跪告曰孝子某將以來月某日祗薦禫事於先考某官府君卜既得吉敢告主人再拜降與在位者皆再拜祝闔門退若不得吉則不用卜既得吉一句前期一日沐浴設位陳器具饌設神位於靈座故處它如大祥之儀厥明行事皆如大祥之儀但主人以下詣祠堂祝奉主櫝置於西階卓子上出主置於座主人以下皆哭盡哀三獻不哭改祝版大祥為禫祭祥事為禫事至辭神乃哭盡哀送神主至祠堂不哭居喪雜儀檀弓曰始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然顔丁善居喪始死皇皇如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息雜記孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂喪服四制曰仁者可以觀其愛焉知者可以觀其禮焉強者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉曲禮曰居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章檀弓曰大功廢業或曰大功誦可也今居喪但勿讀樂章可也雜記三年之喪言而不語對而不問言言已事也為人説為語喪大記父母之喪非喪事不言既葬與人立君言王事不言國事大夫士言公事不言家事檀弓高子臯執親之喪未嘗見齒言笑之微雜記疏衰之喪既葬人請見之則見不請見人小功請見人可也又凡喪小功以上非虞祔練祥無沐浴曲禮頭有創則沐身有瘍則浴喪服四制百官備百物具不言而事行者杖而起言而後事行者杖而起身自執事而後行者面垢而已凡此皆古禮今之賢孝君子必有能盡之者自餘相時量力而行之可也致􅉠奠狀具位姓某某物若干右謹専送上某人靈筵聊備􅉠儀香茶酒食云奠儀伏惟歆納謹狀年月日具位姓某狀降等不用年封皮狀上某官靈筵具位姓某謹封降等即用靣簽云某人靈筵具位姓某狀謹封謝狀三年之喪未卒哭只令子姪發謝書具位姓名某物若干右伏蒙尊慈降等云仁私以某發書者名某親違世大官云薨沒特賜平交云貺􅉠儀禭奠隨事下誠平交不用此二字不任哀感之至謹具平交作奉狀上平交云陳謝謹狀餘並同前但封同不用靈筵字慰人父母亡疏慰嫡孫承重者同某頓首再拜言降等云頓首不意凶變亡者官尊即云邦國不幸後皆放此先某位無官即云先府君有契即加幾丈於某位府君之上母云先某封無封即云先夫人承重則云尊祖考某位尊祖妣某封餘並同奄棄榮養亡者官尊即云奄捐館舍或云奄忽薨逝母封至夫人者亦云薨逝若生者無官即云奄違色養承訃驚怛不能已已伏惟平交云恭惟降等𬗟惟孝心純至思慕號絶何可堪居日月流邁遽踰旬朔經時即云已忽經時已葬即云遽經襄奉卒哭小祥大祥禫除各隨其時哀痛奈何罔極奈何不審自罹荼毒父在母亡即云憂苦氣力何如伏乞平交云伏願降等云惟冀強加􅊡粥已葬則云疏食俯從禮制某役事所縻在官即云職業有守未由奔慰其於憂戀無任下誠平交已下但云某未由奉慰悲係增深謹奉疏平交云狀伏惟鑒察平交以下去此四字不備謹疏平交云不宣謹狀月日具位降等用郡望姓某疏上平交云狀某官大孝苫前母亡即云至孝平交以下云苫次封皮疏上某官大孝苫前具位姓某謹封降等即用靣簽云某官大孝苫次郡望姓名狀謹封若慰人母亡即云至孝重封疏上平交云狀某官具位姓某謹封父母亡答人疏嫡孫承重者同某稽顙再拜言降等去言某罪逆深重不自死滅禍延先考母云先妣承重則祖父云先祖考祖母云先祖妣攀號劈踊五內分崩叩地呌天無所逮及日月不居奄踰旬朔隨時同前酷罰罪苦父在母亡即云偏罰罪深祖父母亦如之無望生全即日蒙恩平交以下去此四字祗奉几筵苟存視息伏蒙尊慈俯賜慰問哀感之至無任下誠平交云承仰持仁恩俯垂慰問其為哀感但切下懷降等云承慰問哀感良深司馬公曰凡遭父母喪知舊不以書來弔問是無相恤之心於禮不當先發書不得已須至先發即刪此四句未由號訴不勝隕絶謹奉疏降等云狀荒迷不次謹疏降等云狀月日孤子母喪稱哀子俱亡即稱孤哀子承重者稱孤孫哀孫孤哀孫姓名疏上某位座前謹空平交以下去此二字封皮重封並同前慰人祖父母亡啓狀謂非承重者伯叔父母姑兄姊弟妹妻子姪孫同某啓不意凶變子孫不用此句尊祖考某位奄忽違世祖母曰尊祖妣某封無官封有契已見上賢伯叔父母姑即加尊字兄姊弟妹加令字降等皆加字若彼一等之親有數人即加行第云幾某位無官云幾府君有契即加幾丈幾兄於某位府君之上姑姊妹則稱以夫姓云某宅尊姑令姊妹令妻則云賢閣某封無封則但云賢閣官子即云伏承子幾某位姪孫並同降等則曰賢無者稱秀才承訃驚怛不能已已妻改怛為愕子孫但云不勝驚怛伏惟恭𬗟見前孝心純至哀慟摧裂何可勝任伯叔父母姑云親愛加隆哀慟沈痛何可堪勝兄姊弟妹則云友愛加隆妻則云伉儷義重悲悼沈痛子姪孫則云慈愛隆深悲慟沈痛餘與伯叔父母姑同孟春猶寒墮時不審尊體何似降等云所履伏乞平交以下如前深自寬抑以慰慈念其人無父母即但云逺誠連書不上平某事役所縻在官如前未由趨慰其於憂想無任下誠平交以下如前謹奉狀伏惟鑒察平交如前不備平交如前謹狀月日具位姓名狀上某位服前平交云服次封皮重封同前祖父母亡答人啓狀謂非承重者伯叔父母姑兄姊弟妹妻子姪孫同某啓家門凶禍伯叔父母姑兄姊弟妹云家門不幸妻云私家不幸子姪孫云私門不幸先祖考祖母云先祖妣伯叔父母云幾伯叔父母姑舍云幾家姑兄姊云幾家兄幾家弟妹云幾弟幾舍妹妻云室人子云小子某姪云從子某孫曰幼孫某姊忽棄背兄弟以下云喪逝子姪孫云遽爾夭折痛苦摧裂不自勝堪伯叔父母姑兄姊弟妹云摧痛酸苦不自堪忍妻改摧痛為悲悼子姪孫改悲悼為悲念伏蒙尊慈特賜慰問哀感之至不任下誠平交降等如前孟春猶寒寒溫隨時伏怍恭怍𬗟惟如前某位尊體起居萬福平交不用起居降等但云動止萬福某即日侍奉無父母即不用此句幸免他苦未由靣訴徒增哽塞謹奉狀上平交云陳謝不備平交如前謹狀月日某郡姓名狀上某位座前謹空平交如前封皮重封如前家禮卷四
