body:
  text: 家禮卷二宋朱子撰冠禮冠男子年十五至二十皆可冠司馬公曰古者二十而冠所以責成人之禮葢将責為人子為人弟為人臣為人少者之行於其人故其禮不可以不重也近世以來人情輕薄過十嵗而總角者少矣彼責以四者之行豈知之哉往往自幼至長愚騃若一由不知成人之道故也今雖未能遽革且自十五以上俟其能通孝經論語粗知禮義然後冠之其亦可也必父母無朞以上喪始可行之大功未𦵏亦不可行前期三日主人告於祠堂古禮筮日今不能然但正月内擇一日可也主人謂冠者之祖父自為繼高祖之宗子者若非宗子則必繼高祖之宗子主之有故則命其次宗子若其父自主之告禮見祠堂章祝版前同但云某之子某若某之某親之子某年漸長成将以某月某日加冠於其首謹以後同若族人以宗子之命自冠其子其祝版亦以宗子為主曰使介子某云若宗子已孤而自冠則亦自為主人祝版前同但某將以某月某日加冠於首謹以後同戒賓古禮筮賓今不能然但擇朋友賢而有禮者一人可也是日主人深衣詣其門所戒者出見如常儀啜茶畢戒者起言曰某有子某若某之某親有子某將加冠於其首願吾子之教之也對曰某不敏恐不能供事以病吾子敢辭戒者曰願吾子之終教之也對曰吾子重有命某敢不從地逺則書初請之辭為書遣子弟致之所戒者辭使者固請乃許而復書曰吾子有命某敢不從若宗子自冠則戒辭但曰某將加冠於首後同前一日宿賓遣子弟以書致辭曰來日某將加冠於子某若某親某子某之首吾子将涖之敢宿某上某人荅書曰某敢不夙興某上某人其若宗子自冠則辭之所改如戒賓陳設設盥帨於㕔事如祠堂之儀以帟幕為房於㕔事東北或㕔事無兩階則以堊畫而分之後放此厥明宿興陳冠服有官者公服帶靴笏無官者襴衫帶靴通用皂衫深衣大帶履櫛􅔮掠皆以卓子陳於房中東領北上酒注盞盤亦以卓子陳於服北幞頭帽子冠并巾各以一盤盛之䝉以帕以卓子陳於西階下執事者一人守之長子則布席於阼階上之東少北西向衆子則少西南向宗子自冠則如長子之席少南主人以下序立主人以下盛服就位主人阼階下少東西向子弟親戚童僕在其後重行西向北上擇子弟親戚習禮者一人為儐立於門外西向將冠者雙紒四䙆衫勒帛采履在房中南向若非宗子之子則其父立於主人之右尊則少進卑則少退宗子自冠則服如將冠者而就主人之位賓至主人迎入升堂賓自擇其子弟親戚習禮者為賛冠者俱盛服至門外東向立賛者在右少退儐者入告主人主人出門左西向再拜賓答拜主人揖賛者賛者報揖主人遂揖而行賓賛從之入門分庭而行揖讓而至階又揖讓而升主人由阼階先升少東西向賓由西階繼升少西東向賛者盥帨由西階升立於房中西向擯者筵於東序少北西向將冠者出房南向若非宗子之子則其父從出迎賓入從主人後賓而升立於主人之右如前賓揖將冠者就席為加冠巾冠者適房服深衣納履出賓揖將冠者出房立於席右向席賛者取櫛􅔮掠置於席左興立於將冠者之左賓揖將冠者即席西向跪賛者即席如其向跪進為之櫛合紒施掠賓降主人亦降賓盥畢主人揖升復位執事者以冠巾盤進賓降一等受冠笄執之正容徐詣將冠者前向之祝曰吉月令日始加元服棄爾㓜志順爾成徳夀考維祺以介景福乃跪加之賛者以巾跪進賓受加之興復位揖冠者適房釋四䙆衫服深衣加大帶納履出房正容南向立良乆主若宗子自冠則賓揖之就席賓降盥畢人不降餘立同再加帽子服皂衫革帶繫鞋賓揖冠者即席跪執事者以帽子盤進賓降二等受之執以詣冠者前祝之曰吉月令辰乃申爾服謹爾威儀淑順爾徳眉夀永年享受胡福乃跪加之興復位揖冠者適房釋深衣服皂衫革帶繫鞋出房立三加幞頭公服革帶納靴執笏若襴衫納靴禮如再加惟執事者以幞頭盤進賓降没階受之祝辭曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶賛者徹帽賓乃加幞頭執事者受帽徹櫛入於房餘並同乃醮長子則賓者改席於堂中間少西南向衆子則仍故席賛者酌酒於房中出房立於冠者之左賓揖冠者就席右南向乃取酒詣席前北向祝之曰㫖酒既清嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘冠者再拜升席南向受盞賓復位東向荅拜冠者進席前跪祭酒興就席末跪啐酒興降席授賛者盞南向再拜賓東向荅拜冠者遂拜賛者賛者賓左東向少退荅拜賓字冠者賓降階東向主人降階西向冠者降自西階少東南向賓字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸冝宜之於嘏永受􅍖之曰伯某父仲叔季唯所當冠者對曰某雖不敏敢不夙夜祗奉賓或别作辭命以字之之意亦可出就次賓請退主人請禮賓賓出就次主人以冠者見於祠堂如祠堂章内生子而見之儀但改告辭曰某之子某若某親某之子某今日冠畢敢見冠者進立於兩階間再拜餘並同降若宗子自冠則改辭曰某今日冠畢敢見遂再拜復位餘並同若冠者私室有曽祖祖以下祠堂則各因其宗子而見自為繼曽祖以下之宗則自見冠者見於尊長父母堂中南靣坐諸叔父兄在東序諸叔父南向諸兄西向諸婦女在西序諸叔母姑南向諸姊嫂東向冠者北向拜父母父母為之起同居有尊長則父母以冠者詣其室拜之尊長為之起還就東西序毎列再拜應荅拜者荅拜若非宗子之子則先見宗子及諸尊於父者於堂乃就私室見於父母及餘親若宗子自冠有母則見於母如儀族人宗之者皆來見於堂上宗子西向拜其尊長每列再拜受卑㓜者拜乃禮賓主人以酒饌延賓及賓賛者酧之以幣而拜謝之幣多少隨宜賓賛有差冠者遂出見於鄉先生及父之執友冠者拜先生執友皆荅拜若有誨之則對如對賓之辭且拜之先生執友不荅拜笄女子許嫁笄年十五雖未許嫁亦笄母為主宗子主婦則其中堂非宗子而與宗子同居則於私室與宗子不同居則如上儀前期三日戒賓一日宿賓賓亦擇親姻婦女之賢而有禮者為之以牋紙書其辭使人致之辭如冠禮但子作女冠作笄吾子作某親或某封夫凡婦人自稱於己之尊長則曰兒卑㓜則以屬於黨尊長則曰新婦卑㓜則曰老婦非親戚而往來者各以其黨為稱後放此陳設如冠禮但於中堂布席如衆子之位厥明陳服如冠禮但用背子冠笄序立主婦如主人之位将笄者雙紒衫子房中南面賓至主婦迎入升堂如冠禮但不用賛者主婦升自阼階賓為将笄者加冠笄適房服背子略如冠禮但祝用始加之辭不能則省乃醮如冠禮辭亦同乃字如冠禮但改祝辭髦士為女士乃禮賓皆如冠儀家禮卷二
